<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SocialCam - App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #050505;
            --nav-bg: rgba(20, 20, 20, 0.6);
            --accent-color: #ffffff;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --ios-blur: blur(30px) saturate(180%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at 50% 0%, #1a1a1a, #050505);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #app-header {
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #app-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .header-actions:active {
            transform: scale(0.9);
        }

        #content-frame {
            flex: 1;
            width: 100%;
            border: none;
            background-color: transparent;
            transition: opacity 0.4s ease;
        }

        #bottom-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            height: 72px;
            background: var(--nav-bg);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            flex: 1;
            height: 100%;
        }

        .nav-item.active {
            color: var(--accent-color);
        }

        /* Global Search Modal */
        #search-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(25px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .search-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .search-input-wrapper {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-input-wrapper input {
            background: none;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            font-size: 16px;
        }

        .close-search { color: #fff; cursor: pointer; font-weight: 600; }

        #search-results-list { flex: 1; overflow-y: auto; }

        .user-result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid var(--glass-border);
        }

        .user-result-info { display: flex; align-items: center; gap: 12px; }
        .user-result-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .add-friend-btn {
            background: #fff; color: #000; border: none; padding: 8px 16px;
            border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer;
        }
    </style>
</head>
<body>

    <header id="app-header">
        <h1>SocialCam</h1>
        <div style="display: flex; gap: 10px;">
            <div class="header-actions" onclick="openSearch()">
                <i data-lucide="search" style="width: 18px; height: 18px;"></i>
            </div>
            <div class="header-actions" onclick="logout()">
                <i data-lucide="log-out" style="width: 18px; height: 18px;"></i>
            </div>
        </div>
    </header>

    <div id="search-modal">
        <div class="search-header">
            <div class="search-input-wrapper">
                <i data-lucide="search" style="width: 18px; color: var(--text-muted);"></i>
                <input type="text" id="global-search-input" placeholder="Tìm tên người dùng..." oninput="handleSearch(this.value)">
            </div>
            <div class="close-search" onclick="closeSearch()">Hủy</div>
        </div>
        <div id="search-results-list"></div>
    </div>

    <iframe id="content-frame" src="page/cam.html"></iframe>

    <nav id="bottom-nav">
        <a href="page/cam.html" class="nav-item active" onclick="loadPage(event, this)">
            <i data-lucide="camera"></i>
            <span style="font-size: 9px; margin-top: 4px;">Máy ảnh</span>
        </a>
        <a href="page/newfest.html" class="nav-item" onclick="loadPage(event, this)" style="background:#fff; color:#000; border-radius:50%; width:50px; height:50px; flex:none; margin:0 10px;">
            <i data-lucide="plus" style="width: 28px; height: 28px;"></i>
        </a>
        <a href="page/image.html" class="nav-item" onclick="loadPage(event, this)">
            <i data-lucide="user"></i>
            <span style="font-size: 9px; margin-top: 4px;">Bạn</span>
        </a>
    </nav>

    <script>
        const user = JSON.parse(localStorage.getItem('socialcam_user'));
        if (!user) window.location.href = "login/index.html";

        lucide.createIcons();

        const searchModal = document.getElementById('search-modal');
        const searchResultsList = document.getElementById('search-results-list');
        const frame = document.getElementById('content-frame');
        const header = document.getElementById('app-header');
        const API_URL = "https://text2team-cam-api.hf.space";

        function openSearch() { searchModal.style.display = 'flex'; document.getElementById('global-search-input').focus(); }
        function closeSearch() { searchModal.style.display = 'none'; }

        async function handleSearch(query) {
            if (query.trim().length < 2) { searchResultsList.innerHTML = ''; return; }
            try {
                const response = await fetch(`${API_URL}/api/search?query=${query}`);
                const users = await response.json();
                renderResults(users);
            } catch (err) { console.error(err); }
        }

        function renderResults(users) {
            if (users.length === 0) { searchResultsList.innerHTML = '<div style="text-align: center; color: #888; padding-top: 50px;">Không tìm thấy</div>'; return; }
            searchResultsList.innerHTML = users.map(u => `
                <div class="user-result-item">
                    <div class="user-result-info">
                        <img src="${API_URL}${u.avatar}" class="user-result-avatar">
                        <span style="font-weight: 600;">${u.username}</span>
                    </div>
                    <button class="add-friend-btn" onclick="addFriend('${u.username}')">Kết bạn</button>
                </div>
            `).join('');
        }

        async function addFriend(friendUsername) {
            try {
                const formData = new FormData();
                formData.append('user_id', user.id);
                formData.append('friend_username', friendUsername);
                const response = await fetch(`${API_URL}/api/add_friend`, { method: 'POST', body: formData });
                if (response.ok) { alert(`Đã kết bạn với ${friendUsername}`); closeSearch(); frame.contentWindow.location.reload(); }
            } catch (err) { alert("Lỗi khi kết bạn"); }
        }

        function logout() { if (confirm("Đăng xuất?")) { localStorage.removeItem('socialcam_user'); window.location.reload(); } }

        function loadPage(event, element) {
            event.preventDefault();
            const url = element.getAttribute('href');
            if (frame.src.endsWith(url)) return;
            frame.style.opacity = '0';
            setTimeout(() => {
                frame.src = url;
                frame.onload = () => frame.style.opacity = '1';
            }, 250);
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            header.style.transform = url.includes('cam.html') ? 'translateY(-100%)' : 'translateY(0)';
            header.style.opacity = url.includes('cam.html') ? '0' : '1';
        }
    </script>
</body>
</html>
