<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Newfest - SocialCam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --text: #ffffff;
            --muted: #a0a0a0;
            --accent: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 80px 0 100px 0; /* Space for fixed elements */
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .feed-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .post-card {
            background: var(--surface);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-header {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #333;
        }

        .username {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .post-time {
            font-size: 0.75rem;
            color: var(--muted);
        }

        .post-image {
            width: 100%;
            aspect-ratio: 4/5;
            background-color: #1a1a1a;
            position: relative;
        }

        .post-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-content {
            padding: 15px;
        }

        .post-actions {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }

        .post-text {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .post-text span {
            font-weight: 600;
            margin-right: 5px;
        }

        /* Post stagger animation */
        .post-card:nth-child(1) { animation-delay: 0.1s; }
        .post-card:nth-child(2) { animation-delay: 0.3s; }
        .post-card:nth-child(3) { animation-delay: 0.5s; }

    </style>
</head>
<body>

    <div class="feed-container">
        <!-- Post 1 -->
        <article class="post-card">
            <div class="post-header">
                <div class="user-info">
                    <img class="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex" alt="">
                    <div>
                        <p class="username">alex_photos</p>
                        <p class="post-time">2 giờ trước</p>
                    </div>
                </div>
                <i data-lucide="more-horizontal"></i>
            </div>
            <div class="post-image">
                <img src="https://picsum.photos/id/10/600/800" alt="Post content">
            </div>
            <div class="post-content">
                <div class="post-actions">
                    <button class="action-btn"><i data-lucide="heart"></i> 1.2k</button>
                    <button class="action-btn"><i data-lucide="message-circle"></i> 45</button>
                    <button class="action-btn"><i data-lucide="send"></i></button>
                </div>
                <div class="post-text">
                    <span>alex_photos</span> Chào buổi sáng với những khung hình mới nhất từ chuyến đi Đà Lạt.
                </div>
            </div>
        </article>

        <!-- Post 2 -->
        <article class="post-card">
            <div class="post-header">
                <div class="user-info">
                    <img class="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Emma" alt="">
                    <div>
                        <p class="username">emma_vibe</p>
                        <p class="post-time">5 giờ trước</p>
                    </div>
                </div>
                <i data-lucide="more-horizontal"></i>
            </div>
            <div class="post-image">
                <img src="https://picsum.photos/id/20/600/800" alt="Post content">
            </div>
            <div class="post-content">
                <div class="post-actions">
                    <button class="action-btn"><i data-lucide="heart"></i> 856</button>
                    <button class="action-btn"><i data-lucide="message-circle"></i> 12</button>
                    <button class="action-btn"><i data-lucide="send"></i></button>
                </div>
                <div class="post-text">
                    <span>emma_vibe</span> Minimalist aesthetic. #vibes #minimalism
                </div>
            </div>
        </article>

        <!-- Post 3 -->
        <article class="post-card">
            <div class="post-header">
                <div class="user-info">
                    <img class="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=John" alt="">
                    <div>
                        <p class="username">tech_guru</p>
                        <p class="post-time">1 ngày trước</p>
                    </div>
                </div>
                <i data-lucide="more-horizontal"></i>
            </div>
            <div class="post-image">
                <img src="https://picsum.photos/id/30/600/800" alt="Post content">
            </div>
            <div class="post-content">
                <div class="post-actions">
                    <button class="action-btn"><i data-lucide="heart"></i> 2.4k</button>
                    <button class="action-btn"><i data-lucide="message-circle"></i> 128</button>
                    <button class="action-btn"><i data-lucide="send"></i></button>
                </div>
                <div class="post-text">
                    <span>tech_guru</span> Đánh giá chi tiết về camera mới nhất đã lên sóng!
                </div>
            </div>
        </article>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
