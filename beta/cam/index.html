<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SocialCam - App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #050505;
            --nav-bg: rgba(20, 20, 20, 0.6);
            --accent-color: #ffffff;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --ios-blur: blur(30px) saturate(180%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at 50% 0%, #1a1a1a, #050505);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Subtle background glow for index */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        #app-header {
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #app-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .header-actions:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.15);
        }

        #content-frame {
            flex: 1;
            width: 100%;
            border: none;
            background-color: transparent;
            transition: opacity 0.4s ease;
        }

        #bottom-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            height: 72px;
            background: var(--nav-bg);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .nav-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            flex: 1;
            height: 100%;
            z-index: 2;
        }

        .nav-item.active {
            color: var(--accent-color);
        }

        .nav-svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-item.active .nav-svg {
            transform: scale(1.1) translateY(-2px);
        }

        .nav-item span {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .nav-item.active span {
            opacity: 1;
        }

        /* Center button (Newfest) - Premium Style */
        .nav-item.center-btn {
            background: #ffffff;
            color: #000000;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            flex: none;
            margin: 0 12px;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
            transform: translateY(0);
        }

        .nav-item.center-btn:active {
            transform: scale(0.9) translateY(2px);
        }

        .center-btn .nav-svg {
            width: 28px;
            height: 28px;
            margin-bottom: 0;
            color: #000;
            stroke-width: 2.5;
        }

        /* Sliding Indicator Pill */
        .nav-indicator-pill {
            position: absolute;
            height: 52px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 26px;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 1;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .icon-fill {
            display: none;
        }

        .nav-item.active .icon-outline {
            display: none;
        }

        .nav-item.active .icon-fill {
            display: block;
        }
    </style>
</head>

<body>

    <header id="app-header" style="transform: translateY(-100%); opacity: 0;">
        <h1>SocialCam</h1>
        <div class="header-actions">
            <i data-lucide="bell" style="width: 18px; height: 18px;"></i>
        </div>
    </header>

    <iframe id="content-frame" src="page/cam.html"></iframe>

    <nav id="bottom-nav">
        <div class="nav-indicator-pill" id="nav-pill"></div>

        <a href="page/cam.html" class="nav-item active" onclick="loadPage(event, this)">
            <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path class="icon-outline"
                    d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle class="icon-outline" cx="12" cy="13" r="4"></circle>
                <path class="icon-fill"
                    d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"
                    fill="currentColor"></path>
            </svg>
            <span>Máy ảnh</span>
        </a>

        <a href="page/newfest.html" class="nav-item center-btn" onclick="loadPage(event, this)">
            <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </a>

        <a href="page/image.html" class="nav-item" onclick="loadPage(event, this)">
            <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect class="icon-outline" x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle class="icon-outline" cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline class="icon-outline" points="21 15 16 10 5 21"></polyline>
                <path class="icon-fill"
                    d="M3 5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5zm6.5 4.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zM5 21h14l-5-5-5 5-4-4z"
                    fill="currentColor"></path>
            </svg>
            <span>Bộ sưu tập</span>
        </a>
    </nav>

    <script>
        lucide.createIcons();

        const pill = document.getElementById('nav-pill');
        const navItems = document.querySelectorAll('.nav-item');
        const frame = document.getElementById('content-frame');
        const header = document.getElementById('app-header');

        function updatePill(element) {
            if (element.classList.contains('center-btn')) {
                pill.style.opacity = '0';
                pill.style.transform = 'translateX(-50%) scale(0.8)';
                return;
            }

            const rect = element.getBoundingClientRect();
            const navRect = document.getElementById('bottom-nav').getBoundingClientRect();

            pill.style.opacity = '1';
            pill.style.width = `${rect.width - 16}px`;
            pill.style.left = `${rect.left - navRect.left + 8}px`;
        }

        // Initialize
        window.addEventListener('load', () => {
            updatePill(document.querySelector('.nav-item.active'));

            // Check initial page to hide/show header
            if (frame.src.includes('cam.html')) {
                header.style.transform = 'translateY(-100%)';
                header.style.opacity = '0';
            } else {
                header.style.transform = 'translateY(0)';
                header.style.opacity = '1';
            }
        });

        function loadPage(event, element) {
            event.preventDefault();
            const url = element.getAttribute('href');
            if (frame.src.endsWith(url)) return;

            // Fade out
            frame.style.opacity = '0';

            setTimeout(() => {
                frame.src = url;
                frame.onload = () => {
                    frame.style.opacity = '1';
                };
            }, 250);

            navItems.forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            updatePill(element);

            if (url.includes('cam.html')) {
                header.style.transform = 'translateY(-100%)';
                header.style.opacity = '0';
            } else {
                header.style.transform = 'translateY(0)';
                header.style.opacity = '1';
            }
        }

        window.addEventListener('resize', () => {
            updatePill(document.querySelector('.nav-item.active'));
        });
    </script>
</body>

</html>
