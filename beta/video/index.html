                for (let j = 0; j < trackClips.length; j++) {
                    const clip = trackClips[j];
                    if (currentTime >= clip.startTime && currentTime < clip.startTime + clip.duration) {
                        activeMap.push(clip);
                    }
                }
            }

            // Sync Video Elements
            const activeVideos = activeMap.filter(c => c.type === 'video');

            // Cleanup: release pool entries no longer needed
            for (let i = 0; i < videoPool.length; i++) {
                const p = videoPool[i];
                if (p.usedBy && p.usedBy !== '__loading__' && !activeVideos.some(c => c.id === p.usedBy)) {
                    releaseVideoElement(p.usedBy);
                }
            }

            // Assign & Update Phase
            for (let i = 0; i < activeVideos.length; i++) {
                const clip = activeVideos[i];
                let p = videoPool.find(x => x.usedBy === clip.id);
                if (!p) {
                    p = getFreeVideoElement();
                    p.usedBy = clip.id;
                    p.element.src = clip.src;
                    const onReady = () => { if (!isPlaying) draw(); };
                    p.element.addEventListener('seeked', onReady, { once: true });
                    p.element.addEventListener('canplay', onReady, { once: true });
                }

                const targetTime = (currentTime - clip.startTime) + clip.offset;
                const timeDiff = Math.abs(p.element.currentTime - targetTime);
                const isSeeking = p.element.seeking;

                if (!isSeeking) {
                    // Tighter drift correction for smoother visuals
                    const threshold = isPlaying ? 0.35 : 0.05; // Relaxed during playback to prevent micro-stutters
                    if (timeDiff > threshold) {
                        p.element.currentTime = targetTime;
                    }
                }

                if (isPlaying && p.element.paused) p.element.play().catch(() => { });
                if (!isPlaying && !p.element.paused) p.element.pause();
            }

            // Sync Audio Elements
            const activeAudios = activeMap.filter(c => c.type === 'audio');

            // Cleanup Audio
            for (let i = 0; i < audioPool.length; i++) {
                const p = audioPool[i];
                if (p.usedBy && !activeAudios.some(c => c.id === p.usedBy)) {
                    releaseAudioElement(p.usedBy);
                }
            }

            // Assign & Update Audio
            for (let i = 0; i < activeAudios.length; i++) {
                const clip = activeAudios[i];
                let p = audioPool.find(x => x.usedBy === clip.id);
                if (!p) {
                    p = getFreeAudioElement();
                    p.usedBy = clip.id;
                    p.element.src = clip.src;
                }

                const targetTime = (currentTime - clip.startTime) + clip.offset;
                const timeDiff = Math.abs(p.element.currentTime - targetTime);

                const threshold = isPlaying ? 0.35 : 0.05;
                if (timeDiff > threshold) {
                    p.element.currentTime = targetTime;
                }

                if (isPlaying && p.element.paused) p.element.play().catch(() => { });
                if (!isPlaying && !p.element.paused) p.element.pause();
            }

            // Clear Canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Paint Phase (Bottom to Top)
            for (let i = 0; i < tracks.length; i++) {
                const trackClips = tracks[i].clips;
                for (let j = 0; j < trackClips.length; j++) {
                    const clip = trackClips[j];
                    if (currentTime >= clip.startTime && currentTime < clip.startTime + clip.duration) {
                        drawClipToCanvas(clip);
                    }
                }
            }

            // High-frequency UI updates throttled or batched
            if (isLoop) {
                const scrollPos = currentTime * pxPerSec;
                tracksScrollArea.scrollLeft = scrollPos;
                rulerScrollWrapper.scrollLeft = scrollPos;
            }
        }

        function drawClipToCanvas(clip) {
            ctx.save();
            if (clip.type === 'video') {
                const p = videoPool.find(x => x.usedBy === clip.id);
                if (p) {
                    let source = null;
                    let vw = 0, vh = 0;

                    if (p.element.readyState >= 2 && !p.element.seeking) {
                        // Live frame available — play directly
                        vw = p.element.videoWidth;
                        vh = p.element.videoHeight;
                        if (vw > 0 && vh > 0) {
                            source = p.element;
                        }
                    } else if (p.lastFrameCanvas && p.lastFrameCanvas.width > 1) {
                        // Seeking or not ready — use cached last frame
                        source = p.lastFrameCanvas;
                        vw = p.lastFrameCanvas.width;
                        vh = p.lastFrameCanvas.height;
                    }

                    if (source && vw > 0 && vh > 0) {
                        const scale = Math.min(canvas.width / vw, canvas.height / vh);
                        const drawW = vw * scale;
                        const drawH = vh * scale;
                        const dx = (canvas.width - drawW) / 2;
                        const dy = (canvas.height - drawH) / 2;
                        ctx.drawImage(source, dx, dy, drawW, drawH);
                    }
                }
            } else if (clip.type === 'image') {
                if (clip.content) {
                    // Center Image
                    ctx.drawImage(clip.content, clip.x - clip.width / 2, clip.y - clip.height / 2, clip.width, clip.height);
                }
            } else if (clip.type === 'text') {
                const fs = canvas.width * 0.05;
                ctx.font = `bold ${fs}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.lineWidth = 3;
                ctx.strokeStyle = 'black';
                ctx.strokeText(clip.content, clip.x, clip.y);
                ctx.fillStyle = 'white';
                ctx.fillText(clip.content, clip.x, clip.y);
            }

            // Selection Box
            if (selectedClipId === clip.id) {
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 2;
                if (clip.type === 'video') {
                    // Draw rect around the video content, not full canvas if scaled
                    // Actually for video clips we treat them as full timeline objects usually
                    // But effectively they are just filling the screen.
                    // Let's draw border around the canvas edge to indicate selection
                    ctx.strokeRect(0, 0, canvas.width, canvas.height);
                } else {
                    ctx.strokeRect(clip.x - (clip.width || 200) / 2, clip.y - (clip.height || 50) / 2, clip.width || 200, clip.height || 50);
                }
            }
            ctx.restore();
        }

        function setupCanvas(w, h) {
            // Always update if we have dimensions
            if (w && h) {
                // PERFORMANCE: Cap internal resolution for preview if source is huge (e.g. 4K)
                const MAX_PREVIEW_WIDTH = 1280;
                let targetW = w;
                let targetH = h;
                if (w > MAX_PREVIEW_WIDTH) {
                    targetW = MAX_PREVIEW_WIDTH;
                    targetH = Math.round(targetW * (h / w));
                }

                // Set internal resolution
                canvas.width = targetW;
                canvas.height = targetH;

                // Set display size (CSS) to maximize usage of space
                const aspect = w / h;
                // Max height available in the top area (approx 50vh)
                const maxHeight = window.innerHeight * 0.50;
                let cssH = maxHeight;
                let cssW = cssH * aspect;

                // If width exceeds window, constrain by width
                if (cssW > window.innerWidth * 0.9) {
                    cssW = window.innerWidth * 0.9;
                    cssH = cssW / aspect;
                }

                canvas.style.width = `${cssW}px`;
                canvas.style.height = `${cssH}px`;

                // Redraw immediately
                requestAnimationFrame(draw);
            }
        }

        // --- 7. PLAYBACK LOOP ---
        function togglePlay() {
            initAudio();
            if (isPlaying) {
                isPlaying = false;
                cancelAnimationFrame(animationId);
                videoPool.forEach(p => p.element.pause());
                audioPool.forEach(p => p.element.pause());
                setTimeout(() => draw(false), 50);
            } else {
                isPlaying = true;
                lastTimestamp = performance.now();
                animationId = requestAnimationFrame(loop);
            }
            updatePlayIcon();
        }

        function loop(timestamp) {
            if (!isPlaying) return;

            // Delta time calculation for consistent playback speed
            let dt = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;
            if (dt > 0.1) dt = 0.016; // Prevent massive jumps if tab is backgrounded

            currentTime += dt;

            if (currentTime >= projectDuration) {
                currentTime = 0;
                togglePlay();
                return;
            }

            draw(true);

            // Throttle UI text update to save CPU/battery
            if (Math.floor(currentTime * 10) !== Math.floor((currentTime - dt) * 10)) {
                currentTimeEl.innerText = formatTimeSimple(currentTime);
            }

            animationId = requestAnimationFrame(loop);
        }

        // Sync ruler scroll to tracks scroll
        tracksScrollArea.addEventListener('scroll', () => {
            rulerScrollWrapper.scrollLeft = tracksScrollArea.scrollLeft;
            if (isDraggingTimeline || isPlaying) return;
            // Simple formula: currentTime = scrollLeft / pxPerSec
            currentTime = Math.max(0, Math.min(tracksScrollArea.scrollLeft / pxPerSec, projectDuration));
            currentTimeEl.innerText = formatTimeSimple(currentTime);
            if (!scrubRafPending) {
                scrubRafPending = true;
                requestAnimationFrame(() => { scrubRafPending = false; draw(); });
            }
        });

        // --- LISTENERS ---
        universalLoader.addEventListener('change', e => {
            Array.from(e.target.files).forEach(f => handleFile(f));
            e.target.value = '';
        });
        videoLoader.addEventListener('change', e => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
            e.target.value = ''; // Reset so same file can be added again
        });
        audioLoader.addEventListener('change', e => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
            e.target.value = '';
        });
        if (overlayLoader) overlayLoader.addEventListener('change', e => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
            e.target.value = '';
        });

        // --- UTILS ---
        function formatTimeSimple(s) {
            const m = Math.floor(s / 60);
            const sc = Math.floor(s % 60);
            return `${m}:${sc.toString().padStart(2, '0')}`;
        }
        function updatePlayIcon() {
            playBtnIcon.innerHTML = isPlaying
                ? `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="w-6 h-6">
                    <rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor"/>
                    <rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor"/>
                   </svg>`
                : `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="w-6 h-6 ml-0.5">
                    <path d="M8 5V19L19 12L8 5Z" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                   </svg>`;
        }

        // --- 8. Split & Navigation Tools ---
        function splitCurrentClip() {
            // 1. Identify Target Clip
            // If playhead inside selected clip, split that.
            // Else split top visible clip at playhead.

            let target = null;
            let track = null;

            if (selectedClipId) {
                // Check if selected is under playhead
                const res = findClipById(selectedClipId);
                if (res && currentTime >= res.clip.startTime && currentTime < res.clip.startTime + res.clip.duration) {
                    target = res.clip;
                    track = res.track;
                }
            }

            if (!target) {
                // Find top visible
                // Tracks 0.Main, 1.Overlay... usually Overlay on top
                for (let i = tracks.length - 1; i >= 0; i--) {
                    const t = tracks[i];
                    const c = t.clips.find(x => currentTime >= x.startTime && currentTime < x.startTime + x.duration);
                    if (c) {
                        target = c;
                        track = t;
                        break;
                    }
                }
            }

            if (target && track) {
                doSplit(track, target);
            }
        }

        function doSplit(track, clip) {
            const splitTime = currentTime;
            const relTime = splitTime - clip.startTime;

            // Safety: Don't split if too close to edges (< 0.1s)
            if (relTime < 0.1 || (clip.duration - relTime) < 0.1) return;

            // 1. Create Right Side Clip
            const rightClip = {
                ...clip,
                id: 'clip-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
                startTime: splitTime,
                duration: clip.duration - relTime,
                offset: clip.offset + relTime
            };

            // Important: if it was audio, it might have cached waveform, but that's okay to inherit
            // because we draw the relevant portion in renderTracks now.

            // 2. Trim Left Side
            clip.duration = relTime;

            // 3. Handle Linked Clips (Split BOTH if possible)
            if (clip.linkedId) {
                const lRes = findClipById(clip.linkedId);
                if (lRes) {
                    const lClip = lRes.clip;
                    const lTrack = lRes.track;
                    const lRelTime = splitTime - lClip.startTime;

                    // Simple sync split for linked audio/video
                    if (lRelTime > 0.05 && (lClip.duration - lRelTime) > 0.05) {
                        const lRightClip = {
                            ...lClip,
                            id: 'clip-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
                            startTime: splitTime,
                            duration: lClip.duration - lRelTime,
                            offset: lClip.offset + lRelTime,
                            linkedId: rightClip.id
                        };
                        lClip.duration = lRelTime;
                        lClip.linkedId = clip.id;
                        rightClip.linkedId = lRightClip.id;

                        const lIdx = lTrack.clips.indexOf(lClip);
                        lTrack.clips.splice(lIdx + 1, 0, lRightClip);
                    }
                }
            }

            // 4. Insert Right Side
            const idx = track.clips.indexOf(clip);
            track.clips.splice(idx + 1, 0, rightClip);

            // 5. Update Selection
            selectedClipId = rightClip.id;

            // 6. Render
            renderTracks();
            draw();
        }

        function findClipById(id) {
            for (const t of tracks) {
                const c = t.clips.find(x => x.id === id);
                if (c) return { track: t, clip: c };
            }
            return null;
        }

        function jumpToPrevCut() {
            // Gather all cut points
            let points = [0];
            tracks.forEach(t => {
                t.clips.forEach(c => {
                    points.push(c.startTime);
                    points.push(c.startTime + c.duration);
                });
            });
            // Sort unique
            points = [...new Set(points)].sort((a, b) => a - b);

            // Find largest point < currentTime
            const epsilon = 0.05;
            let target = 0;
            for (let i = points.length - 1; i >= 0; i--) {
                if (points[i] < currentTime - epsilon) {
                    target = points[i];
                    break;
                }
            }

            currentTime = target;
            updateScrollToPlayhead();
            draw();
        }

        function jumpToNextCut() {
            // Gather all cut points
            let points = [0];
            tracks.forEach(t => {
                t.clips.forEach(c => {
                    points.push(c.startTime);
                    points.push(c.startTime + c.duration);
                });
            });
            // Sort unique
            points = [...new Set(points)].sort((a, b) => a - b);

            // Find smallest point > currentTime
            const epsilon = 0.05;
            let target = projectDuration;
            for (let i = 0; i < points.length; i++) {
                if (points[i] > currentTime + epsilon) {
                    target = points[i];
                    break;
                }
            }

            currentTime = Math.min(target, projectDuration);
            updateScrollToPlayhead();
            draw();
        }

        function updateScrollToPlayhead() {
            // Simple: scroll to currentTime position (content is cX-padded so center = currentTime)
            tracksScrollArea.scrollLeft = currentTime * pxPerSec;
            rulerScrollWrapper.scrollLeft = currentTime * pxPerSec;
            currentTimeEl.innerText = formatTimeSimple(currentTime);
            rulerPlayheadEl.classList.remove('playhead-seek-flash');
            void rulerPlayheadEl.offsetWidth;
            rulerPlayheadEl.classList.add('playhead-seek-flash');
        }

        // --- CLICK TO SEEK (Ruler + Tracks) ---
        function seekToClientX(clientX, scrollEl, offsetX) {
            // offsetX: pixels from left of content where ruler/track canvas starts (= cX padding)
            const rect = scrollEl.getBoundingClientRect();
            const contentX = (clientX - rect.left) + scrollEl.scrollLeft - offsetX;
            currentTime = Math.max(0, Math.min(contentX / pxPerSec, projectDuration));
            updateScrollToPlayhead();
            if (!isPlaying) draw();
        }

        // Ruler: click or drag to scrub
        let isRulerScrubbing = false;
        rulerScrollWrapper.addEventListener('mousedown', (e) => {
            isRulerScrubbing = true;
            // rulerCanvas starts at cX offset into rulerScrollWrapper
            seekToClientX(e.clientX, rulerScrollWrapper, getContentCenterX());
            document.body.style.cursor = 'col-resize';
            window.addEventListener('mousemove', onRulerScrub);
            window.addEventListener('mouseup', onRulerScrubEnd);
        });
        rulerScrollWrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isRulerScrubbing = true;
                seekToClientX(e.touches[0].clientX, rulerScrollWrapper, getContentCenterX());
            }
        }, { passive: true });
        rulerScrollWrapper.addEventListener('touchmove', (e) => {
            if (isRulerScrubbing && e.touches.length === 1) {
                e.preventDefault();
                seekToClientX(e.touches[0].clientX, rulerScrollWrapper, getContentCenterX());
            }
        }, { passive: false });
        rulerScrollWrapper.addEventListener('touchend', () => { isRulerScrubbing = false; });

        function onRulerScrub(e) {
            if (!isRulerScrubbing) return;
            seekToClientX(e.clientX, rulerScrollWrapper, getContentCenterX());
        }
        function onRulerScrubEnd() {
            isRulerScrubbing = false;
            document.body.style.cursor = '';
            window.removeEventListener('mousemove', onRulerScrub);
            window.removeEventListener('mouseup', onRulerScrubEnd);
        }

        // Tracks area: click on empty space to seek
        tracksScrollArea.addEventListener('click', (e) => {
            if (e.target.closest('[data-id]') ||
                e.target.classList.contains('handle-l') ||
                e.target.classList.contains('handle-r')) return;
            // tracksContent is offset by cX
            seekToClientX(e.clientX, tracksScrollArea, getContentCenterX());
        });

        // Resize: recalculate fixed playhead overlay positions
        window.addEventListener('resize', () => {
            updatePlayheadPosition();
            renderTracks(); // recalculate cX padding
        });

        // --- NEW: TIMELINE INTERACTION (Scroll, Pan, Zoom) ---
        let isPanning = false;
        let panStartX = 0;
        let panStartY = 0;
        let panStartScrollX = 0;
        let panStartScrollY = 0;

        // Pinch Zoom State
        let isPinching = false;
        let pinchStartDist = 0;
        let pinchStartPxPerSec = 50;
        let pinchStartMidTime = 0;

        // 1. Wheel: Horizontal Scroll & Zoom
        tracksScrollArea.addEventListener('wheel', (e) => {
            e.preventDefault();

            if (e.ctrlKey) {
                // ZOOM
                const rect = tracksScrollArea.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const timeAtMouse = (tracksScrollArea.scrollLeft + mouseX) / pxPerSec;

                // Zoom factor
                const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
                let newPx = pxPerSec * zoomFactor;
                setZoom(newPx);

                // Adjust scroll to keep timeAtMouse stable
                tracksScrollArea.scrollLeft = (timeAtMouse * pxPerSec) - mouseX;

            } else {
                // SCROLL
                tracksScrollArea.scrollLeft += e.deltaY;
            }
        }, { passive: false });

        // 2. Touch Logic (Unified Pan & Zoom)
        tracksScrollArea.addEventListener('touchstart', (e) => {
            // Check if interacting with a clip or handle handled elsewhere
            if (e.target.closest('[data-id]') || e.target.classList.contains('handle-l') || e.target.classList.contains('handle-r')) {
                // Allow clip drag, don't interfere
                return;
            }

            if (e.touches.length === 2) {
                // START PINCH
                isPinching = true;
                isPanning = false; // Cancel pan if it was active

                const t1 = e.touches[0];
                const t2 = e.touches[1];

                // Distance
                pinchStartDist = Math.hypot(t2.pageX - t1.pageX, t2.pageY - t1.pageY);
                pinchStartPxPerSec = pxPerSec;

                // Midpoint Time
                const rect = tracksScrollArea.getBoundingClientRect();
                const midX = ((t1.pageX + t2.pageX) / 2) - rect.left;
                pinchStartMidTime = (tracksScrollArea.scrollLeft + midX) / pxPerSec;

                e.preventDefault();

            } else if (e.touches.length === 1) {
                // START PAN (2D)
                isPanning = true;
                isPinching = false;
                panStartX = e.touches[0].pageX;
                panStartY = e.touches[0].pageY;
                panStartScrollX = tracksScrollArea.scrollLeft;
                panStartScrollY = tracksScrollArea.scrollTop;
            }
        }, { passive: false });

        tracksScrollArea.addEventListener('touchmove', (e) => {
            if (isPinching && e.touches.length === 2) {
                e.preventDefault();

                const t1 = e.touches[0];
                const t2 = e.touches[1];

                const dist = Math.hypot(t2.pageX - t1.pageX, t2.pageY - t1.pageY);
                if (pinchStartDist < 10) return;

                const scale = dist / pinchStartDist;
                let newPx = pinchStartPxPerSec * scale;
                setZoom(newPx);

                const rect = tracksScrollArea.getBoundingClientRect();
                const midX = ((t1.pageX + t2.pageX) / 2) - rect.left;
                tracksScrollArea.scrollLeft = (pinchStartMidTime * pxPerSec) - midX;

            } else if (isPanning && e.touches.length === 1) {
                e.preventDefault();
                const x = e.touches[0].pageX;
                const y = e.touches[0].pageY;
                const deltaX = x - panStartX;
                const deltaY = y - panStartY;
                tracksScrollArea.scrollLeft = panStartScrollX - deltaX;
                tracksScrollArea.scrollTop = panStartScrollY - deltaY;
            }
        }, { passive: false });

        tracksScrollArea.addEventListener('touchend', (e) => {
            // If fingers lifted, reset
            if (e.touches.length < 2) {
                isPinching = false;
            }
            if (e.touches.length === 0) {
                isPanning = false;
            }
        });

        // Mouse Pan (Desktop)
        tracksScrollArea.addEventListener('mousedown', (e) => {
            if (e.target.closest('[data-id]') || e.target.classList.contains('handle-l') || e.target.classList.contains('handle-r')) return;

            isPanning = true;
            panStartX = e.pageX;
            panStartY = e.pageY;
            panStartScrollX = tracksScrollArea.scrollLeft;
            panStartScrollY = tracksScrollArea.scrollTop;
            tracksScrollArea.style.cursor = 'grabbing';

            window.addEventListener('mousemove', onTimelinePan);
            window.addEventListener('mouseup', onTimelinePanEnd);
        });

        function onTimelinePan(e) {
            if (!isPanning) return;
            e.preventDefault();
            tracksScrollArea.scrollLeft = panStartScrollX - (e.pageX - panStartX);
            tracksScrollArea.scrollTop = panStartScrollY - (e.pageY - panStartY);
            // scroll event listener handles currentTime + draw via rAF
        }

        function onTimelinePanEnd() {
            isPanning = false;
            tracksScrollArea.style.cursor = '';
            window.removeEventListener('mousemove', onTimelinePan);
            window.removeEventListener('mouseup', onTimelinePanEnd);
        }


        // --- 9. ZOOM CONTROLS ---
        function zoomIn() {
            let newPx = pxPerSec * 1.5;
            setZoom(newPx);
        }

        function zoomOut() {
            let newPx = pxPerSec / 1.5;
            setZoom(newPx);
        }

        function zoomFit() {
            let maxTime = 0;
            const clips = getAllClips();
            if (clips.length === 0) {
                maxTime = 60;
            } else {
                clips.forEach(c => maxTime = Math.max(maxTime, c.startTime + c.duration));
                maxTime = Math.max(maxTime * 1.1, 5);
            }
            const timelineWidth = tracksScrollArea.clientWidth;
            setZoom(timelineWidth / maxTime);
        }

        function setZoom(newPx) {
            newPx = Math.max(2, Math.min(newPx, 300));
            pxPerSec = newPx;

            updateProjectDuration();
            renderTracks();
            draw();

            // Keep currentTime visible after zoom using simple formula
            if (!isPlaying) {
                tracksScrollArea.scrollLeft = currentTime * pxPerSec;
                rulerScrollWrapper.scrollLeft = currentTime * pxPerSec;
                updatePlayheadPosition();
            }

            const z = document.getElementById('zoomLevel');
            if (z) {
                z.innerText = Math.round(newPx) + 'px/s';
                z.classList.remove('hidden');
                if (window.zoomTimeout) clearTimeout(window.zoomTimeout);
                window.zoomTimeout = setTimeout(() => z.classList.add('hidden'), 2000);
            }
        }

        // --- 10. EXPORT LOGIC ---
        let isExporting = false;
        let exportRecorder = null;
        let exportChunks = [];

        exportBtn.addEventListener('click', () => {
            if (getAllClips().length === 0) {
                alert("Please add some media tracks first to export.");
                return;
            }
            exportModal.classList.remove('hidden');
            exportModal.style.display = 'flex';
            startExport();
        });

        function cancelExport() {
            isExporting = false;
            if (exportRecorder && exportRecorder.state !== 'inactive') {
                exportRecorder.stop();
            }
            exportModal.classList.add('hidden');
            exportModal.style.display = 'none';
        }

        async function startExport() {
            isExporting = true;
            exportChunks = [];

            // Re-init audio if needed
            initAudio();

            // Connect canvas and audio to MediaStream
            const fps = 30;
            const canvasStream = canvas.captureStream(fps);
            const mixedStream = new MediaStream();

            canvasStream.getVideoTracks().forEach(t => mixedStream.addTrack(t));
            if (mediaDest && mediaDest.stream.getAudioTracks().length > 0) {
                mediaDest.stream.getAudioTracks().forEach(t => mixedStream.addTrack(t));
            }

            try {
                // Determine best supported format
                let options = { mimeType: 'video/webm; codecs=vp9,opus' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm; codecs=vp8,opus' };
                }

                exportRecorder = new MediaRecorder(mixedStream, options);

                exportRecorder.ondataavailable = e => {
                    if (e.data.size > 0) exportChunks.push(e.data);
                };

                exportRecorder.onstop = () => {
                    if (!isExporting) return; // Cancelled by user

                    const blob = new Blob(exportChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `Video_Export_${Date.now()}.webm`;
                    document.body.appendChild(a);
                    a.click();

                    setTimeout(() => {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        cancelExport();
                    }, 100);
                };

                // Pause active playback
                if (isPlaying) togglePlay();

                // Reposition to start
                currentTime = 0;
                lastTimestamp = performance.now();
                updateScrollToPlayhead();

                // Wait briefly for elements to seek back to 0
                await new Promise(r => setTimeout(r, 400));

                if (!isExporting) return;

                exportRecorder.start();

                // Calculate max duration
                let actualDur = 0;
                getAllClips().forEach(c => actualDur = Math.max(actualDur, c.startTime + c.duration));
                if (actualDur === 0) actualDur = projectDuration;

                // Sync renderer manually for capture speed
                const renderStep = () => {
                    if (!isExporting) return;

                    const now = performance.now();
                    const dt = (now - lastTimestamp) / 1000;
                    lastTimestamp = now;

                    // Cap dt to ensure we don't jump too far if browser throttles rAF
                    currentTime += Math.min(dt, 0.1);

                    draw(true);

                    // Update UI Progress
                    const pct = Math.min(100, Math.round((currentTime / actualDur) * 100));
                    progressBar.style.width = pct + '%';
                    progressText.innerText = pct + '%';

                    if (currentTime >= actualDur) {
                        exportRecorder.stop();
                    } else {
                        requestAnimationFrame(renderStep);
                    }
                };

                lastTimestamp = performance.now();
                requestAnimationFrame(renderStep);

            } catch (err) {
                console.error("Export failed:", err);
                alert("Export failed: " + err.message);
                cancelExport();
            }
        }

        // Init: wait for layout then set positions
        renderTracks();
        draw();
        requestAnimationFrame(() => {
            updateScrollToPlayhead();
            updatePlayheadPosition();
        });

        // keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                    deleteSelectedFocus();
                }
            }
        });
    </script>
</body>
