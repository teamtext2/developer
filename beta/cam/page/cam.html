<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camera - SocialCam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --ios-blur: blur(20px);
            --ios-glass: rgba(255, 255, 255, 0.12);
            --ios-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            background: radial-gradient(circle at 50% -20%, #2c2c2e, #000000);
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Changed from center to push content from top */
            padding-top: 40px;
            padding-bottom: 120px; /* Space for bottom navigation bar */
            color: #fff;
        }

        /* Beautiful Background Layer */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(100, 100, 255, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        .glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255, 100, 255, 0.1) 0%, transparent 70%);
            filter: blur(100px);
            animation: move 25s infinite alternate-reverse;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(20%, 20%); }
        }

        /* Main Viewport Container */
        #viewport-wrapper {
            position: relative;
            width: 90%;
            max-width: 420px;
            aspect-ratio: 3 / 4;
            background: #111;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 
                        0 0 0 1px var(--ios-border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: auto; /* Push the UI below it to the bottom */
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror for selfie */
        }

        /* Viewport Overlays */
        .viewport-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            z-index: 5;
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quality-tag {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
        }

        /* Camera Controls */
        #camera-ui {
            width: 100%;
            max-width: 450px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .shutter-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shutter-outer {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            border: 4px solid #fff;
            padding: 4px;
        }

        .shutter-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #fff;
            transition: all 0.2s ease;
        }

        .shutter-outer:active {
            transform: scale(0.9);
        }

        .shutter-outer:active .shutter-inner {
            transform: scale(0.8);
            background-color: rgba(255,255,255,0.9);
        }

        .side-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--ios-glass);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            border: 1px solid var(--ios-border);
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
        }

        .side-btn:active {
            transform: scale(0.85);
            background: rgba(255, 255, 255, 0.2);
        }

        .side-btn i {
            width: 22px;
            height: 22px;
        }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.5);
        }

        .mode-item.active {
            color: #fff;
            position: relative;
        }

        .mode-item.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
        }

        /* Flash & Status */
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .flash-active {
            animation: flashAnim 0.3s ease-out;
        }

        #status-msg {
            position: fixed;
            top: 40px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 24px;
            border-radius: 30px;
            color: #000;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 100;
            display: none;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: springIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes springIn {
            from { transform: translateY(-50px) scale(0.8); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Mobile specific adjustments */
        @media (max-height: 700px) {
            #viewport-wrapper {
                width: 80%;
                margin-bottom: 15px;
            }
            .shutter-outer {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <div id="flash"></div>
    <div id="status-msg">Đã lưu vào bộ sưu tập</div>

    <div id="viewport-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div class="viewport-overlay">
            <div class="top-info">
                <div class="side-btn" style="width: 36px; height: 36px;">
                    <i data-lucide="settings" style="width: 16px; height: 16px;"></i>
                </div>
                <div class="quality-tag">4K • 60 FPS</div>
                <div class="side-btn" style="width: 36px; height: 36px;">
                    <i data-lucide="info" style="width: 16px; height: 16px;"></i>
                </div>
            </div>
            <div style="flex: 1;"></div>
            <div style="display: flex; justify-content: center; margin-bottom: 10px;">
                <div style="background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); padding: 5px 15px; border-radius: 20px; font-size: 11px;">
                    1x
                </div>
            </div>
        </div>
        <canvas id="capture-canvas" style="display: none;"></canvas>
    </div>

    <div class="mode-selector">
        <span class="mode-item">VIDEO</span>
        <span class="mode-item active">ẢNH</span>
        <span class="mode-item">CHÂN DUNG</span>
    </div>

    <div id="camera-ui">
        <div class="side-btn" onclick="toggleFlash()">
            <i data-lucide="zap" id="flash-icon"></i>
        </div>
        
        <div class="shutter-container">
            <div class="shutter-outer" id="shutter-btn">
                <div class="shutter-inner"></div>
            </div>
        </div>

        <div class="side-btn" onclick="switchCamera()">
            <i data-lucide="refresh-cw"></i>
        </div>
    </div>

    <script src="../js/db.js"></script>
    <script>
        lucide.createIcons();
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('capture-canvas');
        const statusMsg = document.getElementById('status-msg');
        const shutterBtn = document.getElementById('shutter-btn');
        const flash = document.getElementById('flash');
        
        let isFlashOn = false;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user', 
                        aspectRatio: 3/4,
                        width: { ideal: 1440 }, 
                        height: { ideal: 1920 } 
                    }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Lỗi truy cập camera: ", err);
                statusMsg.textContent = "Không thể truy cập camera.";
                statusMsg.style.display = 'block';
            }
        }

        async function takePhoto() {
            // Flash effect
            flash.classList.remove('flash-active');
            void flash.offsetWidth; 
            flash.classList.add('flash-active');

            // Set canvas size to match video resolution but maintain 3:4 crop if needed
            // However, video is already object-fit: cover in a 3:4 container.
            // To capture exactly what's shown:
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            
            // Mirror back if it's the front camera
            context.save();
            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            context.restore();
            
            canvas.toBlob(async (blob) => {
                try {
                    if (window.savePhoto) {
                        await savePhoto(blob);
                    }
                    showStatus("Đã lưu ảnh thành công!");
                } catch (err) {
                    console.error("Lỗi lưu ảnh:", err);
                    showStatus("Lỗi khi lưu ảnh.");
                }
            }, 'image/jpeg', 0.95);
        }

        function showStatus(text) {
            statusMsg.textContent = text;
            statusMsg.style.display = 'block';
            setTimeout(() => {
                statusMsg.style.opacity = '0';
                setTimeout(() => {
                    statusMsg.style.display = 'none';
                    statusMsg.style.opacity = '1';
                }, 500);
            }, 2000);
        }

        function toggleFlash() {
            isFlashOn = !isFlashOn;
            const icon = document.getElementById('flash-icon');
            if (isFlashOn) {
                icon.style.color = '#ffcc00';
                icon.style.fill = '#ffcc00';
            } else {
                icon.style.color = '#fff';
                icon.style.fill = 'none';
            }
        }

        shutterBtn.addEventListener('click', takePhoto);

        function switchCamera() {
            // Simplified toggle for demo
            showStatus("Đang chuyển đổi camera...");
        }

        initCamera();
    </script>
</body>
</html>
