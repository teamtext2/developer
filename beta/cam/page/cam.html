<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camera - text2 cam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --ios-blur: blur(20px);
            --ios-glass: rgba(255, 255, 255, 0.12);
            --ios-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            background: radial-gradient(circle at 50% -20%, #2c2c2e, #000000);
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            padding-bottom: 110px; /* Ensure space for nav bar */
            color: #fff;
        }

        /* Beautiful Background Layer */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(100, 100, 255, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        .glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255, 100, 255, 0.1) 0%, transparent 70%);
            filter: blur(100px);
            animation: move 25s infinite alternate-reverse;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(20%, 20%); }
        }

        /* Main Viewport Container */
        #viewport-wrapper {
            position: relative;
            width: 92%;
            max-width: 440px;
            aspect-ratio: 3 / 4;
            background: #111;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 
                        0 0 0 1px var(--ios-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror for selfie */
        }

        /* Viewport Overlays */
        .viewport-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            z-index: 5;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 15%, transparent 75%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
        }

        .viewport-overlay > * {
            pointer-events: auto;
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quality-tag {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
        }

        .bottom-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .camera-actions {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .shutter-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shutter-outer {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            border: 4px solid #fff;
            padding: 3px;
        }

        .shutter-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #fff;
            transition: all 0.2s ease;
        }

        .shutter-outer:active {
            transform: scale(0.9);
        }

        .shutter-outer:active .shutter-inner {
            transform: scale(0.8);
            background-color: rgba(255,255,255,0.9);
        }

        .side-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
        }

        .side-btn:active {
            transform: scale(0.85);
            background: rgba(255, 255, 255, 0.2);
        }

        .side-btn i {
            width: 20px;
            height: 20px;
        }



        /* Flash & Status */
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .flash-active {
            animation: flashAnim 0.3s ease-out;
        }

        #status-msg {
            position: fixed;
            top: 40px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 24px;
            border-radius: 30px;
            color: #000;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 100;
            display: none;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: springIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes springIn {
            from { transform: translateY(-50px) scale(0.8); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Review State UI */
        .review-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 20;
            display: none;
            flex-direction: column;
        }

        #review-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .review-ui {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 25px;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        #caption-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 12px 16px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
        }

        #caption-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .post-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .post-btn:active {
            transform: scale(0.95);
        }

        .post-btn i {
            width: 16px;
            height: 16px;
        }

        .cancel-review-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 30;
        }

        /* Mobile specific adjustments */
        @media (max-height: 700px) {
            #viewport-wrapper {
                width: 85%;
            }
            .shutter-outer {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <div id="flash"></div>
    <div id="status-msg">Đã lưu vào bộ sưu tập</div>

    <div id="viewport-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div class="viewport-overlay">
            <div class="top-info">
                <div class="side-btn" style="width: 36px; height: 36px;">
                    <i data-lucide="settings" style="width: 16px; height: 16px;"></i>
                </div>
                <div class="quality-tag">4K • 60 FPS</div>
                <div class="side-btn" style="width: 36px; height: 36px;">
                    <i data-lucide="info" style="width: 16px; height: 16px;"></i>
                </div>
            </div>
            
            <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
                <div style="background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); padding: 5px 12px; border-radius: 20px; font-size: 11px; margin-top: auto; margin-bottom: 20px;">
                    1x
                </div>
            </div>

            <div class="bottom-controls">
                <div class="camera-actions">
                    <div class="side-btn" onclick="toggleFlash()">
                        <i data-lucide="zap" id="flash-icon"></i>
                    </div>
                    
                    <div class="shutter-container">
                        <div class="shutter-outer" id="shutter-btn">
                            <div class="shutter-inner"></div>
                        </div>
                    </div>

                    <div class="side-btn" onclick="switchCamera()">
                        <i data-lucide="refresh-cw"></i>
                    </div>
                </div>
            </div>

            <!-- Review Overlay -->
            <div id="review-overlay" class="review-overlay">
                <img id="review-img" src="" alt="Review">
                <div class="cancel-review-btn" onclick="cancelReview()">
                    <i data-lucide="x" style="width: 18px; height: 18px;"></i>
                </div>
                <div class="review-ui">
                    <textarea id="caption-input" placeholder="Thêm mô tả cho ảnh..." rows="2"></textarea>
                    <button class="post-btn" onclick="postPhoto()">
                        <span>Đăng ngay</span>
                        <i data-lucide="send"></i>
                    </button>
                </div>
            </div>
        </div>
        <canvas id="capture-canvas" style="display: none;"></canvas>
    </div>

    <script src="../js/db.js"></script>
    <script>
        lucide.createIcons();
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('capture-canvas');
        const statusMsg = document.getElementById('status-msg');
        const shutterBtn = document.getElementById('shutter-btn');
        const flash = document.getElementById('flash');
        
        let isFlashOn = false;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user', 
                        aspectRatio: 3/4,
                        width: { ideal: 1440 }, 
                        height: { ideal: 1920 } 
                    }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Lỗi truy cập camera: ", err);
                statusMsg.textContent = "Không thể truy cập camera.";
                statusMsg.style.display = 'block';
            }
        }

        const reviewOverlay = document.getElementById('review-overlay');
        const reviewImg = document.getElementById('review-img');
        const captionInput = document.getElementById('caption-input');
        
        let currentBlob = null;

        async function takePhoto() {
            // Flash effect
            flash.classList.remove('flash-active');
            void flash.offsetWidth; 
            flash.classList.add('flash-active');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            
            // Mirror back if it's the front camera
            context.save();
            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            context.restore();
            
            canvas.toBlob(async (blob) => {
                currentBlob = blob;
                const url = URL.createObjectURL(blob);
                reviewImg.src = url;
                reviewOverlay.style.display = 'flex';
                captionInput.value = '';
                captionInput.focus();
            }, 'image/jpeg', 0.95);
        }

        function cancelReview() {
            reviewOverlay.style.display = 'none';
            if (reviewImg.src) {
                URL.revokeObjectURL(reviewImg.src);
                reviewImg.src = '';
            }
            currentBlob = null;
        }

        async function postPhoto() {
            if (!currentBlob) return;
            
            const caption = captionInput.value.trim();
            const user = JSON.parse(localStorage.getItem('text2cam_user'));
            
            if (!user) {
                showStatus("Vui lòng đăng nhập để đăng ảnh.");
                return;
            }

            try {
                showStatus("Đang tải ảnh lên...");
                
                // 1. Save locally (optional, keep for offline)
                if (window.savePhoto) {
                    await savePhoto(currentBlob, caption);
                }

                // 2. Send to API
                const formData = new FormData();
                formData.append('user_id', user.id);
                formData.append('caption', caption);
                formData.append('image', currentBlob, 'capture.jpg');

                const response = await fetch('https://text2team-cam-api.hf.space/api/posts', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    showStatus("Đã đăng ảnh thành công!");
                    cancelReview();
                } else {
                    const err = await response.json();
                    throw new Error(err.detail || "Lỗi tải lên");
                }
            } catch (err) {
                console.error("Lỗi đăng ảnh:", err);
                showStatus("Lỗi khi đăng ảnh: " + err.message);
            }
        }

        function showStatus(text) {
            statusMsg.textContent = text;
            statusMsg.style.display = 'block';
            setTimeout(() => {
                statusMsg.style.opacity = '0';
                setTimeout(() => {
                    statusMsg.style.display = 'none';
                    statusMsg.style.opacity = '1';
                }, 500);
            }, 2000);
        }

        function toggleFlash() {
            isFlashOn = !isFlashOn;
            const icon = document.getElementById('flash-icon');
            if (isFlashOn) {
                icon.style.color = '#ffcc00';
                icon.style.fill = '#ffcc00';
            } else {
                icon.style.color = '#fff';
                icon.style.fill = 'none';
            }
        }

        shutterBtn.addEventListener('click', takePhoto);

        function switchCamera() {
            // Simplified toggle for demo
            showStatus("Đang chuyển đổi camera...");
        }

        initCamera();
    </script>
</body>
</html>
