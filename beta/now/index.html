<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Text2 – Social Camera</title>
    <meta name="description" content="Text2 – Mạng xã hội chia sẻ ảnh, chụp hình và lưu trữ đám mây" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #ffffff;
            --surface: #f4f4f4;
            --border: #e2e2e2;
            --text: #111111;
            --text-muted: #999;
            --accent: #7b9ec8;
            --nav-h: 74px;
            --header-h: 58px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ── HEADER ── */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            border-bottom: 1px solid var(--border);
            z-index: 200;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .logo-badge {
            width: 34px;
            height: 34px;
            background: #111;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            line-height: 1;
            gap: 1px;
            border: 2px solid #222;
        }

        .logo-badge span {
            font-size: 7.5px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.2px;
            display: block;
            text-align: center;
        }

        .logo-name {
            font-size: 17px;
            font-weight: 700;
            font-style: italic;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .btn-settings {
            width: 36px;
            height: 36px;
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.18s;
        }

        .btn-settings:hover {
            background: var(--surface);
        }

        /* ── IFRAME PAGES ── */
        .page-frame {
            position: fixed;
            top: var(--header-h);
            left: 0;
            right: 0;
            bottom: calc(var(--nav-h) + var(--safe-bottom));
            width: 100%;
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease;
            background: #fff;
        }

        .page-frame.active {
            opacity: 1;
            pointer-events: all;
        }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(var(--nav-h) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: #fff;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 200;
            padding-left: 20px;
            padding-right: 20px;
        }

        .nav-btn {
            flex: 1;
            max-width: 160px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: none;
            border: 1.8px solid var(--border);
            border-radius: 100px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-style: italic;
            font-weight: 600;
            color: var(--text);
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            white-space: nowrap;
            user-select: none;
        }

        .nav-btn:hover {
            background: var(--surface);
            border-color: #ccc;
        }

        .nav-btn:active {
            transform: scale(0.97);
        }

        .nav-btn.active {
            background: var(--text);
            border-color: var(--text);
            color: #fff;
        }

        /* Active: camera SVG stroke → white */
        .nav-btn.active svg[data-icon="camera"] path,
        .nav-btn.active svg[data-icon="camera"] circle {
            stroke: #fff;
        }

        /* Active: people SVG fill → white */
        .nav-btn.active svg[data-icon="people"] path {
            fill: #fff;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="app-header">
        <div class="header-logo">
            <div class="logo-badge">
                <span>TEX</span>
                <span>T2</span>
            </div>
            <span class="logo-name">Text2</span>
        </div>
        <button class="btn-settings" id="btn-settings" title="Settings" aria-label="Settings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.7"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3" />
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
          a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
          A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
          l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
          A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
          l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
          a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
          l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
          a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
        </button>
    </header>

    <!-- PAGES — keep-alive iframes -->
    <iframe id="frame-cam" class="page-frame active" src="page/cam.html" title="Camera"></iframe>
    <iframe id="frame-image" class="page-frame" src="page/image.html" title="Friends Images"></iframe>
    <iframe id="frame-newfest" class="page-frame" src="page/newfest.html" title="Newsfeed"></iframe>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav" role="navigation" aria-label="Main navigation">

        <button class="nav-btn active" id="nav-cam" onclick="navigate('cam')" aria-label="Camera">
            <svg data-icon="camera" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111"
                stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                <circle cx="12" cy="13" r="4" />
            </svg>
            Camera
        </button>

        <button class="nav-btn" id="nav-image" onclick="navigate('image')" aria-label="Image">
            <svg data-icon="people" width="21" height="21" viewBox="0 0 24 24" fill="#111" stroke="none">
                <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8
          0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7
          1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84
          1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
            </svg>
            Image
        </button>

    </nav>

    <script>
        let current = 'cam';

        function navigate(page) {
            if (current === page) return;
            document.getElementById('frame-' + current).classList.remove('active');
            document.getElementById('nav-' + current)?.classList.remove('active');
            document.getElementById('frame-' + page).classList.add('active');
            document.getElementById('nav-' + page)?.classList.add('active');
            current = page;
        }

        document.getElementById('btn-settings').addEventListener('click', () => {
            navigate('newfest');
        });
    </script>
</body>

</html>
