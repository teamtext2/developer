<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Text2 – Social Camera</title>
    <meta name="description" content="Text2 – Mạng xã hội chia sẻ ảnh, chụp hình và lưu trữ đám mây" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #ffffff;
            --surface: #f5f5f5;
            --border: #e0e0e0;
            --text: #1a1a1a;
            --text-muted: #888;
            --accent: #7b9ec8;
            --accent-soft: #a9bfda;
            --nav-h: 80px;
            --header-h: 60px;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-badge {
            width: 36px;
            height: 36px;
            background: #1a1a1a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
            border: 2px solid #333;
        }

        .logo-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            font-style: italic;
        }

        .btn-settings {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .btn-settings:hover {
            background: var(--surface);
        }

        .btn-settings svg {
            display: block;
        }

        /* ===== IFRAME PAGES ===== */
        .page-frame {
            position: fixed;
            top: var(--header-h);
            left: 0;
            right: 0;
            bottom: var(--nav-h);
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .page-frame.active {
            opacity: 1;
            pointer-events: all;
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-h);
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 24px 12px;
            z-index: 100;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: none;
            border: 2px solid var(--border);
            border-radius: 50px;
            padding: 10px 28px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-style: italic;
            font-weight: 500;
            color: var(--text);
            transition: all 0.22s ease;
            min-width: 130px;
            justify-content: center;
        }

        .nav-btn svg {
            flex-shrink: 0;
        }

        .nav-btn:hover {
            background: var(--surface);
            border-color: #bbb;
        }

        .nav-btn.active {
            background: var(--text);
            border-color: var(--text);
            color: #fff;
        }

        .nav-btn.active svg path,
        .nav-btn.active svg circle,
        .nav-btn.active svg rect {
            stroke: #fff;
        }

        .nav-btn.active .icon-people path {
            fill: #fff;
            stroke: none;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="app-header">
        <div class="header-logo">
            <div class="logo-badge">TEX<br>T2</div>
            <span class="logo-name">Text2</span>
        </div>
        <button class="btn-settings" id="btn-settings" title="Settings">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3" />
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
        </button>
    </header>

    <!-- PAGES (iframes keep-alive) -->
    <iframe id="frame-cam" class="page-frame active" src="page/cam.html" title="Camera"></iframe>
    <iframe id="frame-image" class="page-frame" src="page/image.html" title="Friends Images"></iframe>
    <iframe id="frame-newfest" class="page-frame" src="page/newfest.html" title="Newsfeed"></iframe>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <button class="nav-btn active" id="nav-cam" onclick="navigate('cam')">
            <!-- Camera icon -->
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                <circle cx="12" cy="13" r="4" />
            </svg>
            Camera
        </button>

        <button class="nav-btn" id="nav-image" onclick="navigate('image')">
            <!-- People icon -->
            <svg class="icon-people" width="22" height="22" viewBox="0 0 24 24" fill="#1a1a1a" stroke="none">
                <path
                    d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
            </svg>
            Image
        </button>
    </nav>

    <script>
        const pages = ['cam', 'image', 'newfest'];
        let current = 'cam';

        function navigate(page) {
            if (current === page) return;
            // hide old
            document.getElementById('frame-' + current).classList.remove('active');
            document.getElementById('nav-' + current)?.classList.remove('active');
            // show new
            document.getElementById('frame-' + page).classList.add('active');
            document.getElementById('nav-' + page)?.classList.add('active');
            current = page;
        }

        // Settings button → navigate to newsfeed as demo, or expand later
        document.getElementById('btn-settings').addEventListener('click', () => {
            navigate('newfest');
        });
    </script>
</body>

</html>
