<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Newfest - text2 cam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.5);
            --accent: #ffffff;
            --ios-blur: blur(20px);
            --ios-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background: radial-gradient(circle at 50% 0%, #1a1a1a, #050505);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 20px 0 120px 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .glow-1 {
            position: absolute;
            top: 10%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(100, 100, 255, 0.08) 0%, transparent 70%);
            filter: blur(80px);
        }

        .feed-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 25px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .search-wrapper {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: var(--ios-blur);
            border: 1px solid var(--ios-border);
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-wrapper input {
            background: none;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            font-size: 15px;
        }

        .search-results {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid var(--ios-border);
            border-radius: 20px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .user-result {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .user-result:last-child { border-bottom: none; }

        .add-btn {
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Post Card */
        .post-card {
            background: var(--surface);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border-radius: 28px;
            margin-bottom: 30px;
            overflow: hidden;
            border: 1px solid var(--ios-border);
            animation: fadeIn 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .post-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #222;
            border: 1px solid var(--ios-border);
            object-fit: cover;
        }

        .username {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .post-time {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 500;
        }

        .post-image {
            width: 100%;
            aspect-ratio: 4/5;
            background-color: #000;
            position: relative;
            overflow: hidden;
        }

        .post-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-content {
            padding: 20px;
        }

        .post-actions {
            display: flex;
            gap: 24px;
            margin-bottom: 15px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .post-text {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.9);
        }

        .post-text span {
            font-weight: 700;
            margin-right: 8px;
            color: #fff;
        }

        .loading-text {
            text-align: center;
            padding: 50px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="bg-glow">
        <div class="glow-1"></div>
    </div>

    <div class="feed-container">
        <!-- Search -->
        <div class="search-container">
            <div class="search-wrapper">
                <i data-lucide="search" style="width: 18px; color: var(--muted);"></i>
                <input type="text" id="user-search" placeholder="Tìm tên người dùng...">
            </div>
            <div id="search-results" class="search-results"></div>
        </div>

        <div id="posts-feed">
            <div class="loading-text">Đang tải bảng tin...</div>
        </div>
    </div>

    <script>
        const API_URL = "https://text2team-cam-api.hf.space";
        const user = JSON.parse(localStorage.getItem('text2cam_user'));

        if (!user) {
            window.location.href = "../login/index.html";
        }

        // Initialize Icons
        lucide.createIcons();

        // Search Logic
        const searchInput = document.getElementById('user-search');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/search?query=${query}`);
                const data = await response.json();
                
                renderSearchResults(data);
            } catch (err) {
                console.error(err);
            }
        });

        function renderSearchResults(users) {
            if (users.length === 0) {
                searchResults.innerHTML = '<div style="padding: 20px; text-align: center; color: #888;">Không tìm thấy người dùng</div>';
            } else {
                searchResults.innerHTML = users.map(u => `
                    <div class="user-result">
                        <div class="user-info">
                            <img src="${API_URL}${u.avatar}" class="user-avatar">
                            <span class="username">${u.username}</span>
                        </div>
                        <button class="add-btn" onclick="addFriend('${u.username}')">Kết bạn</button>
                    </div>
                `).join('');
            }
            searchResults.style.display = 'block';
        }

        async function addFriend(friendUsername) {
            try {
                const formData = new FormData();
                formData.append('user_id', user.id);
                formData.append('friend_username', friendUsername);

                const response = await fetch(`${API_URL}/api/add_friend`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert(`Đã kết bạn với ${friendUsername}`);
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                    loadFeed(); // Refresh feed to see their posts
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Feed Logic
        async function loadFeed() {
            try {
                const response = await fetch(`${API_URL}/api/feed?user_id=${user.id}`);
                const posts = await response.json();
                
                renderFeed(posts);
            } catch (err) {
                console.error(err);
                document.getElementById('posts-feed').innerHTML = '<div class="loading-text">Lỗi khi tải bảng tin.</div>';
            }
        }

        function renderFeed(posts) {
            const feedContainer = document.getElementById('posts-feed');
            if (posts.length === 0) {
                feedContainer.innerHTML = '<div class="loading-text">Chưa có bài viết nào từ bạn bè. Hãy kết bạn để xem thêm!</div>';
                return;
            }

            feedContainer.innerHTML = posts.map(post => `
                <article class="post-card">
                    <div class="post-header">
                        <div class="user-info">
                            <img class="user-avatar" src="${API_URL}${post.user_avatar}" alt="">
                            <div>
                                <p class="username">${post.username}</p>
                                <p class="post-time">${formatTime(post.timestamp)}</p>
                            </div>
                        </div>
                        <i data-lucide="more-horizontal" style="color: var(--muted); width: 20px;"></i>
                    </div>
                    <div class="post-image">
                        <img src="${API_URL}${post.image_url}" alt="Post content" loading="lazy">
                    </div>
                    <div class="post-content">
                        <div class="post-actions">
                            <button class="action-btn"><i data-lucide="heart" style="width: 22px;"></i></button>
                            <button class="action-btn"><i data-lucide="message-circle" style="width: 22px;"></i></button>
                            <button class="action-btn"><i data-lucide="send" style="width: 22px;"></i></button>
                        </div>
                        <div class="post-text">
                            <span>${post.username}</span> ${post.caption}
                        </div>
                    </div>
                </article>
            `).join('');
            
            lucide.createIcons();
        }

        function formatTime(timestamp) {
            const now = Date.now() / 1000;
            const diff = now - timestamp;
            if (diff < 60) return 'Vừa xong';
            if (diff < 3600) return `${Math.floor(diff/60)} phút trước`;
            if (diff < 86400) return `${Math.floor(diff/3600)} giờ trước`;
            return `${Math.floor(diff/86400)} ngày trước`;
        }

        // Close search when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.style.display = 'none';
            }
        });

        loadFeed();
    </script>
</body>
</html>
