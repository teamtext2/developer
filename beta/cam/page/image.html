<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bạn - SocialCam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(255, 255, 255, 0.05);
            --accent: #ffffff;
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.5);
            --error: #ff453a;
            --ios-blur: blur(20px);
            --ios-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background: radial-gradient(circle at 50% 0%, #1a1a1a, #050505);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 20px 20px 120px 20px;
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .glow-1 {
            position: absolute;
            top: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(100, 100, 255, 0.1) 0%, transparent 70%);
            filter: blur(80px);
        }

        /* Profile Header */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .profile-avatar-container {
            position: relative;
            margin-bottom: 15px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #fff;
            padding: 3px;
            background: var(--bg);
            object-fit: cover;
        }

        .edit-avatar-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #fff;
            color: #000;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .profile-username {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        .profile-email {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 15px;
        }

        .edit-profile-btn {
            background: var(--surface);
            border: 1px solid var(--ios-border);
            color: #fff;
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: var(--ios-blur);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            background: var(--surface);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--ios-border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Grid */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            margin-top: 30px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .grid-item {
            aspect-ratio: 1;
            background: #111;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            flex-direction: column;
            padding: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .close-modal {
            cursor: pointer;
            color: var(--muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--ios-border);
            border-radius: 12px;
            padding: 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        .save-btn {
            background: #fff;
            color: #000;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }

        .delete-btn {
            background: rgba(255, 69, 58, 0.1);
            color: var(--error);
            border: 1px solid rgba(255, 69, 58, 0.2);
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Post Detail Overlay */
        #post-detail-modal img {
            width: 100%;
            aspect-ratio: 4/5;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="bg-glow">
        <div class="glow-1"></div>
    </div>

    <!-- Profile Info -->
    <div class="profile-header">
        <div class="profile-avatar-container">
            <img src="" alt="" class="profile-avatar" id="my-avatar">
        </div>
        <h2 class="profile-username" id="my-username">Username</h2>
        <p class="profile-email" id="my-email">email@gmail.com</p>
        <button class="edit-profile-btn" onclick="openEditProfile()">Chỉnh sửa hồ sơ</button>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-value" id="post-count">0</span>
            <span class="stat-label">Bài viết</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="friend-count">0</span>
            <span class="stat-label">Bạn bè</span>
        </div>
    </div>

    <!-- My Photos -->
    <h3 class="section-title">Ảnh của bạn</h3>
    <div class="image-grid" id="my-photos-grid"></div>

    <!-- Edit Profile Modal -->
    <div id="edit-profile-modal" class="modal">
        <div class="modal-header">
            <h2 class="modal-title">Chỉnh sửa hồ sơ</h2>
            <div class="close-modal" onclick="closeModals()"><i data-lucide="x"></i></div>
        </div>
        <div class="form-group" style="text-align: center;">
            <label for="edit-avatar-input" style="cursor: pointer;">
                <img src="" id="edit-avatar-preview"
                    style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px;">
                <div style="color: #007aff; font-size: 0.85rem;">Thay đổi ảnh đại diện</div>
            </label>
            <input type="file" id="edit-avatar-input" style="display: none;" accept="image/*"
                onchange="previewNewAvatar(this)">
        </div>
        <div class="form-group">
            <label>Tên người dùng (Username)</label>
            <input type="text" id="edit-username" placeholder="Username">
        </div>
        <button class="save-btn" onclick="saveProfile()">Lưu thay đổi</button>
    </div>

    <!-- Post Detail/Edit Modal -->
    <div id="post-detail-modal" class="modal">
        <div class="modal-header">
            <h2 class="modal-title">Chi tiết bài viết</h2>
            <div class="close-modal" onclick="closeModals()"><i data-lucide="x"></i></div>
        </div>
        <img id="detail-img" src="">
        <div class="form-group">
            <label>Mô tả ảnh</label>
            <textarea id="detail-caption" rows="3"></textarea>
        </div>
        <button class="save-btn" id="update-post-btn">Cập nhật mô tả</button>
        <button class="delete-btn" id="delete-post-btn">Xóa bài viết</button>
    </div>

    <script>
        const API_URL = "https://text2team-cam-api.hf.space";
        let user = JSON.parse(localStorage.getItem('socialcam_user'));

        if (!user) window.location.href = "../login/index.html";

        lucide.createIcons();

        // Load Initial Data
        async function init() {
            renderProfile();
            loadStats();
            loadMyPhotos();
        }

        function renderProfile() {
            document.getElementById('my-avatar').src = API_URL + user.avatar;
            document.getElementById('my-username').innerText = user.username;
            document.getElementById('my-email').innerText = user.email;

            document.getElementById('edit-avatar-preview').src = API_URL + user.avatar;
            document.getElementById('edit-username').value = user.username;
        }

        async function loadStats() {
            try {
                const [posts, friends] = await Promise.all([
                    fetch(`${API_URL}/api/user_posts?user_id=${user.id}`).then(r => r.json()),
                    fetch(`${API_URL}/api/friends?user_id=${user.id}`).then(r => r.json())
                ]);
                document.getElementById('post-count').innerText = posts.length;
                document.getElementById('friend-count').innerText = friends.length;
            } catch (e) { }
        }

        async function loadMyPhotos() {
            const grid = document.getElementById('my-photos-grid');
            try {
                const posts = await fetch(`${API_URL}/api/user_posts?user_id=${user.id}`).then(r => r.json());
                grid.innerHTML = posts.map(p => `
                    <div class="grid-item" onclick='openPostDetail(${JSON.stringify(p)})'>
                        <img src="${API_URL}${p.image_url}" loading="lazy">
                    </div>
                `).join('');
            } catch (e) { }
        }

        // Profile Actions
        function openEditProfile() { document.getElementById('edit-profile-modal').style.display = 'flex'; }

        function previewNewAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('edit-avatar-preview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveProfile() {
            const newUsername = document.getElementById('edit-username').value.trim();
            const avatarFile = document.getElementById('edit-avatar-input').files[0];

            const formData = new FormData();
            formData.append('user_id', user.id);
            if (newUsername) formData.append('username', newUsername);
            if (avatarFile) formData.append('avatar', avatarFile);

            try {
                const response = await fetch(`${API_URL}/api/update_profile`, { method: 'POST', body: formData });
                const result = await response.json();
                if (response.ok) {
                    user = result.user;
                    localStorage.setItem('socialcam_user', JSON.stringify(user));
                    alert("Đã cập nhật hồ sơ!");
                    location.reload();
                } else { alert(result.detail || "Lỗi cập nhật"); }
            } catch (e) { alert("Lỗi kết nối"); }
        }

        // Post Actions
        function openPostDetail(post) {
            const modal = document.getElementById('post-detail-modal');
            document.getElementById('detail-img').src = API_URL + post.image_url;
            document.getElementById('detail-caption').value = post.caption;

            document.getElementById('update-post-btn').onclick = () => updatePost(post.id);
            document.getElementById('delete-post-btn').onclick = () => deletePost(post.id);

            modal.style.display = 'flex';
        }

        async function updatePost(postId) {
            const caption = document.getElementById('detail-caption').value.trim();
            const formData = new FormData();
            formData.append('post_id', postId);
            formData.append('user_id', user.id);
            formData.append('caption', caption);

            try {
                await fetch(`${API_URL}/api/update_post`, { method: 'POST', body: formData });
                alert("Đã cập nhật!");
                location.reload();
            } catch (e) { alert("Lỗi"); }
        }

        async function deletePost(postId) {
            if (!confirm("Bạn có chắc muốn xóa ảnh này?")) return;
            const formData = new FormData();
            formData.append('post_id', postId);
            formData.append('user_id', user.id);

            try {
                await fetch(`${API_URL}/api/delete_post`, { method: 'POST', body: formData });
                alert("Đã xóa!");
                location.reload();
            } catch (e) { alert("Lỗi"); }
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        init();
    </script>
</body>

</html>
