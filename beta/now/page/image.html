<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>My Images</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%; height: 100%;
      background: #fff;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── SECTIONS ── */
    .page { padding: 18px 16px 24px; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 12px;
    }

    /* ── MY PHOTOS GRID ── */
    .my-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 28px;
    }

    .my-card {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      background: #7b9ec8;
      cursor: pointer;
      position: relative;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .my-card:active { transform: scale(0.96); }
    .my-card img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* Delete button (hover on desktop) */
    .my-card .del-btn {
      position: absolute;
      top: 6px; right: 6px;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: none; cursor: pointer;
      display: none;
      align-items: center; justify-content: center;
      color: #fff; font-size: 13px;
      line-height: 1;
    }
    .my-card:hover .del-btn { display: flex; }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 36px 0;
      color: #ccc;
    }
    .empty-state p { font-size: 13px; margin-top: 10px; }

    /* ── FRIENDS GRID ── */
    .friends-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .friend-card {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      background: #7b9ec8;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      font-size: 11.5px;
      font-weight: 600;
      color: #1a1a1a;
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
    }
    .friend-card:nth-child(2n) { background: #8fb2d4; }
    .friend-card:nth-child(3n) { background: #6a8fb8; }
    .friend-card:active { transform: scale(0.96); }
    .friend-card img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 20px; right: 18px;
      width: 50px; height: 50px;
      background: #111;
      border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
      transition: transform 0.18s;
      z-index: 50;
    }
    .fab:active { transform: scale(0.9); }
    input#file-upload { display: none; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(20,20,20,0.82);
      color: #fff; padding: 9px 20px;
      border-radius: 24px; font-size: 13px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.28s;
      white-space: nowrap; z-index: 99;
      backdrop-filter: blur(6px);
    }
    .toast.show { opacity: 1; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox img {
      max-width: 94%; max-height: 88vh;
      border-radius: 18px;
      object-fit: contain;
    }
    .lb-close {
      position: absolute; top: 18px; right: 18px;
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.14);
      border: none; border-radius: 50%;
      color: #fff; font-size: 18px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="section-label">My Photos</div>
    <div class="my-grid" id="my-grid"></div>

    <div class="section-label">Friends</div>
    <div class="friends-grid" id="friends-grid">
      <div class="friend-card">Image of user end friend</div>
      <div class="friend-card">Image of user end friend</div>
      <div class="friend-card">Image of user end friend</div>
      <div class="friend-card">Image of user end friend</div>
      <div class="friend-card">Image of user end friend</div>
      <div class="friend-card">Image of user end friend</div>
    </div>
  </div>

  <!-- Upload FAB -->
  <button class="fab" id="fab-upload" title="Thêm ảnh" aria-label="Upload photo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
      stroke="#fff" stroke-width="2.3" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5"  y1="12" x2="19" y2="12"/>
    </svg>
  </button>
  <input type="file" id="file-upload" accept="image/*" multiple />

  <div class="toast" id="toast"></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lb-close">✕</button>
    <img id="lb-img" src="" alt="Preview" />
  </div>

  <script>
    const DB_NAME = 'text2_photos', STORE = 'photos';
    let db;

    function openDB() {
      return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains(STORE))
            d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        };
        req.onsuccess = e => { db = e.target.result; res(db); };
        req.onerror = rej;
      });
    }
    const getAllPhotos = () => new Promise(res =>
      db.transaction(STORE,'readonly').objectStore(STORE).getAll().onsuccess = e => res(e.target.result));
    const deletePhoto = id => new Promise(res => {
      const tx = db.transaction(STORE, 'readwrite'); tx.objectStore(STORE).delete(id); tx.oncomplete = res;
    });
    const addPhoto = dataUrl => new Promise(res => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).add({ dataUrl, timestamp: Date.now() });
      tx.oncomplete = res;
    });

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    /* Lightbox */
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    document.getElementById('lb-close').onclick = () => lightbox.classList.remove('open');
    lightbox.onclick = e => { if (e.target === lightbox) lightbox.classList.remove('open'); };
    const openLB = src => { lbImg.src = src; lightbox.classList.add('open'); };

    /* Render my photos */
    async function renderMyPhotos() {
      const photos = await getAllPhotos();
      const grid = document.getElementById('my-grid');
      grid.innerHTML = '';

      if (!photos.length) {
        grid.innerHTML = `<div class="empty-state">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.3"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="4"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>Chưa có ảnh nào</p>
        </div>`;
        return;
      }

      [...photos].reverse().forEach(photo => {
        const card = document.createElement('div');
        card.className = 'my-card';
        card.innerHTML = `
          <img src="${photo.dataUrl}" alt="photo" />
          <button class="del-btn" data-id="${photo.id}" aria-label="Xóa">✕</button>`;
        card.querySelector('img').onclick = () => openLB(photo.dataUrl);
        card.querySelector('.del-btn').onclick = async e => {
          e.stopPropagation();
          await deletePhoto(photo.id);
          showToast('🗑️ Đã xóa');
          renderMyPhotos();
        };
        grid.appendChild(card);
      });
    }

    /* Upload */
    document.getElementById('fab-upload').onclick = () =>
      document.getElementById('file-upload').click();

    document.getElementById('file-upload').onchange = async e => {
      const files = [...e.target.files];
      await Promise.all(files.map(f => new Promise(res => {
        const r = new FileReader();
        r.onload = async ev => { await addPhoto(ev.target.result); res(); };
        r.readAsDataURL(f);
      })));
      showToast(`✅ Đã tải ${files.length} ảnh`);
      renderMyPhotos();
      e.target.value = '';
    };

    /* Friends → newfest */
    document.querySelectorAll('.friend-card').forEach(c =>
      c.onclick = () => { if (window.parent !== window) window.parent.navigate('newfest'); }
    );

    openDB().then(renderMyPhotos);
  </script>
</body>
</html>
