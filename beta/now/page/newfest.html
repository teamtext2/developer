<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Newsfeed</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%; height: 100%;
      background: #fff;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── FEED WRAPPER ── */
    .feed {
      padding: 16px 16px 28px;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    /* ── FEED ITEM ── */
    .feed-item {
      display: flex;
      flex-direction: column;
      gap: 0;
      animation: fadeUp 0.38s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* User row */
    .feed-user {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #7b9ec8;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-size: 13.5px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-time { font-size: 11px; color: #aaa; margin-top: 1px; }

    /* ── IMAGE CARD ── */
    .feed-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 22px;
      background: #7b9ec8;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform 0.18s;
      margin-bottom: 10px;
    }
    .feed-image:active { transform: scale(0.99); }
    .feed-image img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700;
      color: rgba(0,0,0,0.55);
      text-align: center; padding: 20px;
    }

    /* ── NOTE BAR ── */
    .feed-note {
      background: #a9bfda;
      border-radius: 16px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }
    .note-text {
      font-size: 13.5px;
      font-weight: 600;
      color: #1a1a1a;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Action buttons */
    .feed-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .act-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: none; border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.15s;
    }
    .act-btn:hover  { background: rgba(0,0,0,0.07); }
    .act-btn:active { transform: scale(0.88); }
    .act-btn.liked svg path { fill: #e04040; stroke: #e04040 !important; }

    /* ── LOAD MORE INDICATOR ── */
    .load-more {
      text-align: center;
      padding: 14px;
      font-size: 12.5px;
      color: #bbb;
    }
    .load-more.loading { color: #7b9ec8; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox img {
      max-width: 94%; max-height: 88vh;
      border-radius: 18px;
      object-fit: contain;
    }
    .lb-close {
      position: absolute; top: 18px; right: 18px;
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.14);
      border: none; border-radius: 50%;
      color: #fff; font-size: 18px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

  <div class="feed" id="feed"></div>
  <div class="load-more" id="load-more">↓ Kéo xuống để xem thêm</div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lb-close">✕</button>
    <img id="lb-img" src="" alt="Preview" />
  </div>

  <script>
    /* ── Mock data ── */
    const USERS = [
      { name: 'Alex Nguyen', init: 'A', color: '#7b9ec8', time: '2 phút trước'   },
      { name: 'Maria Le',    init: 'M', color: '#8fb2d4', time: '15 phút trước'  },
      { name: 'David Tran',  init: 'D', color: '#6a8fb8', time: '1 giờ trước'    },
      { name: 'Sophie Pham', init: 'S', color: '#9ab6d8', time: '3 giờ trước'    },
      { name: 'Kevin Ho',    init: 'K', color: '#5f84ae', time: 'Hôm qua'        },
    ];
    const NOTES = [
      'title of image user  task note',
      'Một buổi chiều đẹp tuyệt vời 🌅',
      'Khoảnh khắc đáng nhớ ❤️',
      'Photo of the day – feeling great!',
      'Sharing my world with you 📸',
    ];
    const IMG_COLORS = ['#7b9ec8','#8fb2d4','#6a8fb8','#9ab6d8','#5f84ae','#a5c0d9'];

    /* ── IndexedDB ── */
    const DB_NAME = 'text2_photos', STORE = 'photos';
    let db;
    function openDB() {
      return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains(STORE))
            d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        };
        req.onsuccess = e => { db = e.target.result; res(db); };
        req.onerror = rej;
      });
    }
    const getAllPhotos = () => new Promise(res =>
      db.transaction(STORE,'readonly').objectStore(STORE).getAll().onsuccess =
        e => res([...e.target.result].reverse())
    );

    /* ── Lightbox ── */
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    document.getElementById('lb-close').onclick = () => lightbox.classList.remove('open');
    lightbox.onclick = e => { if (e.target === lightbox) lightbox.classList.remove('open'); };
    const openLB = src => { lbImg.src = src; lightbox.classList.add('open'); };

    /* ── Build single feed card ── */
    function buildCard(idx, realPhoto) {
      const user  = USERS[idx % USERS.length];
      const note  = NOTES[idx % NOTES.length];
      const color = IMG_COLORS[idx % IMG_COLORS.length];

      const el = document.createElement('div');
      el.className = 'feed-item';
      el.style.animationDelay = `${(idx % 5) * 0.07}s`;

      const imgInner = realPhoto
        ? `<img src="${realPhoto.dataUrl}" alt="photo" />`
        : `<div class="img-placeholder" style="background:${color}">Image of user end friend</div>`;

      el.innerHTML = `
        <div class="feed-user">
          <div class="user-avatar" style="background:${user.color}">${user.init}</div>
          <div class="user-info">
            <div class="user-name">${user.name}</div>
            <div class="user-time">${user.time}</div>
          </div>
        </div>

        <div class="feed-image" style="background:${color}">
          ${imgInner}
        </div>

        <div class="feed-note">
          <span class="note-text">${note}</span>
          <div class="feed-actions">
            <button class="act-btn" id="like-${idx}" aria-label="Like">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06
                  a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06
                  a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </button>
            <button class="act-btn" aria-label="Comment">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </button>
            <button class="act-btn" aria-label="Share">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"/>
                <circle cx="6" cy="12" r="3"/>
                <circle cx="18" cy="19" r="3"/>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                <line x1="15.41" y1="6.51"  x2="8.59"  y2="10.49"/>
              </svg>
            </button>
          </div>
        </div>`;

      /* like toggle */
      el.querySelector(`#like-${idx}`).onclick = function() { this.classList.toggle('liked'); };

      /* lightbox for real photo */
      if (realPhoto) {
        el.querySelector('.feed-image').onclick = () => openLB(realPhoto.dataUrl);
      }

      return el;
    }

    /* ── Infinite feed ── */
    let page = 0;
    const PER = 4;
    let loading = false;
    let allPhotos = [];

    async function loadMore(append = true) {
      if (loading) return;
      loading = true;
      const bar = document.getElementById('load-more');
      bar.textContent = '⏳ Đang tải...';
      bar.classList.add('loading');

      if (!append) { allPhotos = await getAllPhotos(); page = 0; }
      await new Promise(r => setTimeout(r, append ? 600 : 0));

      const container = document.getElementById('feed');
      if (!append) container.innerHTML = '';

      for (let i = 0; i < PER; i++) {
        const gi = page * PER + i;
        const rp = gi < allPhotos.length ? allPhotos[gi] : null;
        container.appendChild(buildCard(gi, rp));
      }
      page++;

      bar.textContent = '↓ Kéo xuống để xem thêm';
      bar.classList.remove('loading');
      loading = false;
    }

    /* scroll trigger */
    window.addEventListener('scroll', () => {
      const near = window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 100;
      if (near) loadMore(true);
    });

    openDB().then(() => loadMore(false));
  </script>
</body>
</html>
