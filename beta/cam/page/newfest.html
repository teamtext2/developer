<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Newfest - SocialCam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.5);
            --accent: #ffffff;
            --ios-blur: blur(20px);
            --ios-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background: radial-gradient(circle at 50% 0%, #1a1a1a, #050505);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 100px 0 120px 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Beautiful Background Layer */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .glow-1 {
            position: absolute;
            top: 10%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(100, 100, 255, 0.08) 0%, transparent 70%);
            filter: blur(80px);
        }

        .feed-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .post-card {
            background: var(--surface);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border-radius: 28px;
            margin-bottom: 30px;
            overflow: hidden;
            border: 1px solid var(--ios-border);
            animation: fadeIn 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #222;
            border: 1px solid var(--ios-border);
        }

        .username {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .post-time {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 500;
        }

        .post-image {
            width: 100%;
            aspect-ratio: 4/5;
            background-color: #000;
            position: relative;
            overflow: hidden;
        }

        .post-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-content {
            padding: 20px;
        }

        .post-actions {
            display: flex;
            gap: 24px;
            margin-bottom: 15px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        .post-text {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.9);
        }

        .post-text span {
            font-weight: 700;
            margin-right: 8px;
            color: #fff;
        }

        /* Post stagger animation */
        .post-card:nth-child(1) { animation-delay: 0.1s; }
        .post-card:nth-child(2) { animation-delay: 0.25s; }
        .post-card:nth-child(3) { animation-delay: 0.4s; }

    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="glow-1"></div>
    </div>

    <div class="feed-container">
        <!-- Post 1 -->
        <article class="post-card">
            <div class="post-header">
                <div class="user-info">
                    <img class="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex" alt="">
                    <div>
                        <p class="username">alex_photos</p>
                        <p class="post-time">2 giờ trước</p>
                    </div>
                </div>
                <i data-lucide="more-horizontal" style="color: var(--muted); width: 20px;"></i>
            </div>
            <div class="post-image">
                <img src="https://picsum.photos/id/10/600/800" alt="Post content" loading="lazy">
            </div>
            <div class="post-content">
                <div class="post-actions">
                    <button class="action-btn"><i data-lucide="heart" style="width: 22px;"></i> 1.2k</button>
                    <button class="action-btn"><i data-lucide="message-circle" style="width: 22px;"></i> 45</button>
                    <button class="action-btn"><i data-lucide="send" style="width: 22px;"></i></button>
                </div>
                <div class="post-text">
                    <span>alex_photos</span> Chào buổi sáng với những khung hình mới nhất từ chuyến đi Đà Lạt.
                </div>
            </div>
        </article>

        <!-- Post 2 -->
        <article class="post-card">
            <div class="post-header">
                <div class="user-info">
                    <img class="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Emma" alt="">
                    <div>
                        <p class="username">emma_vibe</p>
                        <p class="post-time">5 giờ trước</p>
                    </div>
                </div>
                <i data-lucide="more-horizontal" style="color: var(--muted); width: 20px;"></i>
            </div>
            <div class="post-image">
                <img src="https://picsum.photos/id/20/600/800" alt="Post content" loading="lazy">
            </div>
            <div class="post-content">
                <div class="post-actions">
                    <button class="action-btn"><i data-lucide="heart" style="width: 22px;"></i> 856</button>
                    <button class="action-btn"><i data-lucide="message-circle" style="width: 22px;"></i> 12</button>
                    <button class="action-btn"><i data-lucide="send" style="width: 22px;"></i></button>
                </div>
                <div class="post-text">
                    <span>emma_vibe</span> Minimalist aesthetic. #vibes #minimalism
                </div>
            </div>
        </article>

        <!-- Post 3 -->
        <article class="post-card">
            <div class="post-header">
                <div class="user-info">
                    <img class="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=John" alt="">
                    <div>
                        <p class="username">tech_guru</p>
                        <p class="post-time">1 ngày trước</p>
                    </div>
                </div>
                <i data-lucide="more-horizontal" style="color: var(--muted); width: 20px;"></i>
            </div>
            <div class="post-image">
                <img src="https://picsum.photos/id/30/600/800" alt="Post content" loading="lazy">
            </div>
            <div class="post-content">
                <div class="post-actions">
                    <button class="action-btn"><i data-lucide="heart" style="width: 22px;"></i> 2.4k</button>
                    <button class="action-btn"><i data-lucide="message-circle" style="width: 22px;"></i> 128</button>
                    <button class="action-btn"><i data-lucide="send" style="width: 22px;"></i></button>
                </div>
                <div class="post-text">
                    <span>tech_guru</span> Đánh giá chi tiết về camera mới nhất đã lên sóng!
                </div>
            </div>
        </article>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
