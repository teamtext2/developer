<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bộ sưu tập - SocialCam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --accent: #ffffff;
            --text: #ffffff;
            --muted: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 80px 20px 100px 20px; /* Space for fixed header/nav */
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title span {
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 400;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .grid-item {
            aspect-ratio: 1;
            background-color: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .friends-list {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 30px;
            scrollbar-width: none;
        }

        .friends-list::-webkit-scrollbar {
            display: none;
        }

        .friend-item {
            flex: 0 0 70px;
            text-align: center;
        }

        .friend-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); 
            padding: 2px;
            margin-bottom: 5px;
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--bg);
            overflow: hidden;
        }

        .avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .friend-name {
            font-size: 0.7rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--muted);
        }
    </style>
</head>
<body>

    <h2 class="section-title">Bạn bè <span>Xem tất cả</span></h2>
    <div class="friends-list">
        <div class="friend-item">
            <div class="friend-avatar">
                <div class="avatar-inner">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="">
                </div>
            </div>
            <p class="friend-name">Felix</p>
        </div>
        <div class="friend-item">
            <div class="friend-avatar">
                <div class="avatar-inner">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Milo" alt="">
                </div>
            </div>
            <p class="friend-name">Milo</p>
        </div>
        <div class="friend-item">
            <div class="friend-avatar">
                <div class="avatar-inner">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Luna" alt="">
                </div>
            </div>
            <p class="friend-name">Luna</p>
        </div>
        <div class="friend-item">
            <div class="friend-avatar">
                <div class="avatar-inner">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Oscar" alt="">
                </div>
            </div>
            <p class="friend-name">Oscar</p>
        </div>
        <div class="friend-item">
            <div class="friend-avatar">
                <div class="avatar-inner">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Bella" alt="">
                </div>
            </div>
            <p class="friend-name">Bella</p>
        </div>
    </div>

    <h2 class="section-title">Ảnh của bạn</h2>
    <div class="image-grid" id="user-photos-grid">
        <!-- Ảnh từ IndexedDB sẽ được chèn vào đây -->
        <div class="empty-state" id="no-photos">Bạn chưa có bức ảnh nào. Hãy chụp ngay!</div>
    </div>

    <script src="../js/db.js"></script>
    <script>
        lucide.createIcons();

        async function loadPhotos() {
            const grid = document.getElementById('user-photos-grid');
            const noPhotosMsg = document.getElementById('no-photos');
            
            try {
                const photos = await getAllPhotos();
                
                if (photos.length > 0) {
                    noPhotosMsg.style.display = 'none';
                    
                    // Sắp xếp ảnh mới nhất lên đầu
                    photos.sort((a, b) => b.timestamp - a.timestamp);

                    photos.forEach(photo => {
                        const gridItem = document.createElement('div');
                        gridItem.className = 'grid-item';
                        
                        const img = document.createElement('img');
                        // Chuyển Blob thành URL để hiển thị
                        const imageUrl = URL.createObjectURL(photo.data);
                        img.src = imageUrl;
                        img.alt = "Captured Photo";
                        
                        gridItem.appendChild(img);
                        grid.appendChild(gridItem);
                    });
                }
            } catch (err) {
                console.error("Lỗi khi tải ảnh từ DB:", err);
            }
        }

        loadPhotos();
    </script>
</body>
</html>
