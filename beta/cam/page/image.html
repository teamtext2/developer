<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bộ sưu tập - SocialCam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(255, 255, 255, 0.05);
            --accent: #ffffff;
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.5);
            --ios-blur: blur(20px);
            --ios-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background: radial-gradient(circle at 50% 0%, #1a1a1a, #050505);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 100px 20px 120px 20px;
            min-height: 100vh;
        }

        /* Beautiful Background Layer */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .glow-1 {
            position: absolute;
            top: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(100, 100, 255, 0.1) 0%, transparent 70%);
            filter: blur(80px);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.5px;
        }

        .section-title span {
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 500;
            background: var(--surface);
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid var(--ios-border);
        }

        .friends-list {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 5px 0 25px 0;
            margin-bottom: 20px;
            scrollbar-width: none;
        }

        .friends-list::-webkit-scrollbar {
            display: none;
        }

        .friend-item {
            flex: 0 0 65px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .friend-item:active {
            transform: scale(0.9);
        }

        .friend-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); 
            padding: 2.5px;
            margin-bottom: 8px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--bg);
            overflow: hidden;
        }

        .avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .friend-name {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.8;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 30px;
        }

        .grid-item {
            aspect-ratio: 1;
            background-color: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--ios-border);
            transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .grid-item:active {
            transform: scale(0.95);
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .empty-state {
            grid-column: span 3;
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            background: var(--surface);
            backdrop-filter: var(--ios-blur);
            border-radius: 24px;
            border: 1px solid var(--ios-border);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .empty-state i {
            display: block;
            margin: 0 auto 15px auto;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="glow-1"></div>
    </div>

    <h2 class="section-title">Bạn bè <span>Tất cả</span></h2>
    <div class="friends-list">
        <div class="friend-item">
            <div class="friend-avatar">
                <div class="avatar-inner">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="">
                </div>
            </div>
            <p class="friend-name">Felix</p>
        </div>
        <div class="friend-item">
            <div class="friend-avatar">
                <div class="avatar-inner">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Milo" alt="">
                </div>
            </div>
            <p class="friend-name">Milo</p>
        </div>
        <div class="friend-item">
            <div class="friend-avatar">
                <div class="avatar-inner">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Luna" alt="">
                </div>
            </div>
            <p class="friend-name">Luna</p>
        </div>
        <div class="friend-item">
            <div class="friend-avatar">
                <div class="avatar-inner">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Oscar" alt="">
                </div>
            </div>
            <p class="friend-name">Oscar</p>
        </div>
        <div class="friend-item">
            <div class="friend-avatar">
                <div class="avatar-inner">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Bella" alt="">
                </div>
            </div>
            <p class="friend-name">Bella</p>
        </div>
    </div>

    <h2 class="section-title">Ảnh của bạn</h2>
    <div class="image-grid" id="user-photos-grid">
        <div class="empty-state" id="no-photos">
            <i data-lucide="camera" style="width: 32px; height: 32px;"></i>
            Bạn chưa có bức ảnh nào.<br>Hãy chụp những khoảnh khắc đầu tiên!
        </div>
    </div>

    <script src="../js/db.js"></script>
    <script>
        lucide.createIcons();

        async function loadPhotos() {
            const grid = document.getElementById('user-photos-grid');
            const noPhotosMsg = document.getElementById('no-photos');
            
            try {
                const photos = await getAllPhotos();
                
                if (photos.length > 0) {
                    noPhotosMsg.style.display = 'none';
                    
                    // Sắp xếp ảnh mới nhất lên đầu
                    photos.sort((a, b) => b.timestamp - a.timestamp);

                    photos.forEach(photo => {
                        const gridItem = document.createElement('div');
                        gridItem.className = 'grid-item';
                        
                        const img = document.createElement('img');
                        const imageUrl = URL.createObjectURL(photo.data);
                        img.src = imageUrl;
                        img.alt = "Captured Photo";
                        img.loading = "lazy";
                        
                        gridItem.appendChild(img);
                        grid.appendChild(gridItem);
                    });
                }
            } catch (err) {
                console.error("Lỗi khi tải ảnh từ DB:", err);
            }
        }

        loadPhotos();
    </script>
</body>
</html>
