<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bộ sưu tập - SocialCam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(255, 255, 255, 0.05);
            --accent: #ffffff;
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.5);
            --ios-blur: blur(20px);
            --ios-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background: radial-gradient(circle at 50% 0%, #1a1a1a, #050505);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 20px 20px 120px 20px;
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .glow-1 {
            position: absolute;
            top: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(100, 100, 255, 0.1) 0%, transparent 70%);
            filter: blur(80px);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.5px;
        }

        .section-title span {
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 500;
            background: var(--surface);
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid var(--ios-border);
        }

        .friends-list {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 5px 0 25px 0;
            margin-bottom: 20px;
            scrollbar-width: none;
        }

        .friends-list::-webkit-scrollbar {
            display: none;
        }

        .friend-item {
            flex: 0 0 65px;
            text-align: center;
        }

        .friend-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); 
            padding: 2.5px;
            margin-bottom: 8px;
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--bg);
            overflow: hidden;
        }

        .avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .friend-name {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.8;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 30px;
        }

        .grid-item {
            aspect-ratio: 1;
            background-color: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--ios-border);
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .empty-state {
            grid-column: span 3;
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            background: var(--surface);
            backdrop-filter: var(--ios-blur);
            border-radius: 24px;
            border: 1px solid var(--ios-border);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="bg-glow">
        <div class="glow-1"></div>
    </div>

    <h2 class="section-title">Bạn bè <span id="friend-count">0</span></h2>
    <div class="friends-list" id="friends-list">
        <!-- Friends will be loaded here -->
    </div>

    <h2 class="section-title">Ảnh của bạn <span id="photo-count">0</span></h2>
    <div class="image-grid" id="user-photos-grid">
        <div class="empty-state" id="no-photos">
            <i data-lucide="camera" style="width: 32px; height: 32px; margin: 0 auto 10px; display: block; opacity: 0.5;"></i>
            Đang tải ảnh...
        </div>
    </div>

    <script>
        const API_URL = "https://text2team-cam-api.hf.space";
        const user = JSON.parse(localStorage.getItem('socialcam_user'));

        if (!user) {
            window.location.href = "../login/index.html";
        }

        lucide.createIcons();

        async function initGallery() {
            loadFriends();
            loadUserPhotos();
        }

        async function loadFriends() {
            const list = document.getElementById('friends-list');
            const countLabel = document.getElementById('friend-count');
            
            try {
                const response = await fetch(`${API_URL}/api/friends?user_id=${user.id}`);
                const friends = await response.json();
                
                countLabel.innerText = friends.length;
                
                if (friends.length === 0) {
                    list.innerHTML = '<p style="color: #555; font-size: 0.8rem; padding: 10px;">Chưa có bạn bè. Hãy tìm kiếm ở Bảng tin!</p>';
                    return;
                }

                list.innerHTML = friends.map(f => `
                    <div class="friend-item">
                        <div class="friend-avatar">
                            <div class="avatar-inner">
                                <img src="${API_URL}${f.avatar}" alt="${f.username}">
                            </div>
                        </div>
                        <p class="friend-name">${f.username}</p>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Lỗi khi tải bạn bè:", err);
            }
        }

        async function loadUserPhotos() {
            const grid = document.getElementById('user-photos-grid');
            const noPhotosMsg = document.getElementById('no-photos');
            const countLabel = document.getElementById('photo-count');
            
            try {
                const response = await fetch(`${API_URL}/api/user_posts?user_id=${user.id}`);
                const posts = await response.json();
                
                countLabel.innerText = posts.length;
                
                if (posts.length > 0) {
                    noPhotosMsg.style.display = 'none';
                    grid.innerHTML = posts.map(post => `
                        <div class="grid-item">
                            <img src="${API_URL}${post.image_url}" alt="Post" loading="lazy">
                        </div>
                    `).join('');
                } else {
                    noPhotosMsg.innerHTML = `
                        <i data-lucide="camera" style="width: 32px; height: 32px; margin: 0 auto 10px; display: block; opacity: 0.5;"></i>
                        Bạn chưa có bức ảnh nào.<br>Hãy chụp những khoảnh khắc đầu tiên!
                    `;
                    lucide.createIcons();
                }
            } catch (err) {
                console.error("Lỗi khi tải ảnh:", err);
                noPhotosMsg.innerText = "Lỗi khi tải ảnh từ máy chủ.";
            }
        }

        initGallery();
    </script>
</body>
</html>
